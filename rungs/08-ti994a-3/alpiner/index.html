<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ALPINER — rung 8 (TI-99/4A class)</title>
<style>
  /* Rung 8 of the arcade progression. One file, zero external requests.
     TI-99/4A class climbing game, after Alpiner (Texas Instruments, 1982,
     programmed by Janet Srimushnam). Palette: TMS9918A 15 colours + transparent.
     THE RUNG'S THESIS (A-30): the speech synthesizer was sold separately, so the
     cartridge had to be complete without it — therefore speech CANNOT carry
     load-bearing information. Here that is enforced, not narrated: Speech never
     touches game state, and tests.muteEquivalence() proves it. */
  html,body{margin:0;padding:0;background:#000;color:#fff;font-family:monospace;
    height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;
    touch-action:none}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center}
  #topRow{display:flex;gap:6px;margin:4px 0;z-index:5;flex-wrap:wrap;
    justify-content:center}
  #topRow button{background:#000;color:#0dd;border:1px solid #444;font-family:monospace;
    font-size:13px;padding:6px 12px;border-radius:4px}
  #topRow button:active{background:#333}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;
    display:block}
  .ctl{position:fixed;bottom:10px;display:none;background:rgba(60,60,60,.35);
    border:2px solid #666;border-radius:10px;color:#fff;font-size:34px;
    width:190px;height:76px;z-index:6;font-family:monospace;text-align:center;
    line-height:70px}
  .touch .ctl{display:block}
  #bL{left:10px}
  #bR{right:10px}
  #bU,#bD{position:fixed;display:none;background:rgba(60,60,60,.35);border:2px solid #666;
    border-radius:10px;color:#fff;font-size:26px;width:110px;height:56px;z-index:6;
    font-family:monospace;text-align:center;line-height:52px;left:50%;
    margin-left:-55px}
  .touch #bU,.touch #bD{display:block}
  #bU{bottom:92px}
  #bD{bottom:10px}
  #fb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;z-index:20;
    align-items:center;justify-content:center}
  #fb.open{display:flex}
  #fbBox{background:#111;border:2px solid #0dd;border-radius:8px;padding:14px;
    width:min(480px,92vw)}
  #fbBox h2{margin:0 0 8px;font-size:15px;color:#0dd}
  #fbText{width:100%;height:90px;background:#000;color:#fff;border:1px solid #444;
    font-family:monospace;font-size:13px;box-sizing:border-box}
  #fbBox button{background:#000;color:#fff;border:1px solid #666;font-family:monospace;
    padding:6px 10px;margin:8px 6px 0 0;border-radius:4px}
  #fbNote{font-size:11px;color:#888;margin-top:6px}
</style>
</head>
<body>
<div id="topRow">
  <button id="bP">PAUSE</button><button id="bT">TITLE</button>
  <button id="bS">SOUND:ON</button><button id="bV">SPEECH:ON</button>
  <button id="bF">FEEDBACK</button>
</div>
<canvas id="screen" width="256" height="192"></canvas>
<div id="bL" class="ctl">&#9664;</div>
<div id="bR" class="ctl">&#9654;</div>
<div id="bU">&#9650;</div>
<div id="bD">&#9660;</div>
<div id="fb"><div id="fbBox">
  <h2>PLAYTEST FEEDBACK — game is paused</h2>
  <textarea id="fbText" placeholder="What happened? What felt wrong or right?"></textarea>
  <div>
    <button id="fbGit">OPEN GITHUB ISSUE</button>
    <button id="fbCopy">COPY REPORT</button>
    <button id="fbClose">CLOSE</button>
  </div>
  <div id="fbNote">Context (state, score, mountain) is attached automatically.</div>
</div></div>
<script>
'use strict';
/* ====================== TMS9918A palette ================================== */
/* 15 colours + transparent, fixed in the chip — not programmable. [ASSUMED RGB:
   the VDP emitted analog values; every RGB table is a reconstruction — A-9's kin,
   same caveat carried since rung 5.] */
const TI={
  transparent:'#000000', black:'#000000',
  mediumGreen:'#21c842', lightGreen:'#5edc78',
  darkBlue:'#5455ed',    lightBlue:'#7d76fc',
  darkRed:'#d4524d',     cyan:'#42ebf5',
  mediumRed:'#fc5554',   lightRed:'#ff7978',
  darkYellow:'#d4c154',  lightYellow:'#e6ce80',
  darkGreen:'#21b03b',   magenta:'#c95bba',
  gray:'#cccccc',        white:'#ffffff'
};
/* ====================== sourced constants ================================= */
/* Every number in this block comes from the TI Alpiner manual (archive.org item
   AlpinerManual) unless tagged. See ARCHAEOLOGY.md rung 8. */
const METRES_PER_STEP=46;                       /* manual, verbatim */
const MOUNTAINS=[                               /* strict ascending elevation */
  {name:'MT. HOOD',      m:3427, base:[10,20,30]},
  {name:'MATTERHORN',    m:4477, base:[12,24,36]},
  {name:'MT. KENYA',     m:5193, base:[15,30,45]},
  {name:'MT. MCKINLEY',  m:6194, base:[20,40,60]},
  {name:'MT. GARMO',     m:7495, base:[25,50,75]},
  {name:'MT. EVEREST',   m:8848, base:[30,60,90]}
];
/* Eleven obstacles + the Snowman. "pen" = steps knocked down (manual table). */
const HAZ={
  tree:      {pen:0,  col:'darkGreen',   ch:'T', blocks:true },
  stump:     {pen:2,  col:'darkYellow',  ch:'n'},
  skunk:     {pen:2,  col:'white',       ch:'s', spray:2},
  snake:     {pen:3,  col:'mediumGreen', ch:'~'},
  bat:       {pen:5,  col:'magenta',     ch:'v'},
  fire:      {pen:5,  col:'mediumRed',   ch:'*'},
  bear:      {pen:6,  col:'darkRed',     ch:'B', bonus:500},
  lion:      {pen:7,  col:'lightYellow', ch:'L', bonus:750},
  vulture:   {pen:8,  col:'gray',        ch:'V'},
  ram:       {pen:9,  col:'lightRed',    ch:'R', bonus:1000},
  snowman:   {pen:-1, col:'white',       ch:'Y'}   /* -1 = crash to the bottom */
};
const GROUND=['stump','skunk','snake','bat','fire','bear','lion','vulture','ram'];
const COLS=32, VIEW_ROWS=24, CELL=8;
const START_LIVES=4;                            /* 3 reserve boots + 1 on screen */
const STEP_MS=110;                              /* input repeat rate [AUTHORED] */
const STILL_MS=260;                             /* "not moving" threshold, A-31 */
const CLIMB_SECONDS=[90,80,70];                 /* per round [AUTHORED] */
/* ====================== seeded RNG (A-32: same seed, same mountain) ======== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
/* ====================== game state ======================================== */
const cv=document.getElementById('screen'), cx=cv.getContext('2d');
cx.imageSmoothingEnabled=false;
const G={
  state:'title', score:0, lives:START_LIVES, level:0, round:0,
  col:16, row:0, rows:0, grid:null, camera:0, steps:0, timer:0,
  paused:false, sound:true, speech:true, testMode:false, testScore:false,
  cue:null, cueUntil:0, falling:[], seed:1, rng:null, lastStepAt:-1e9,
  now:0, entry:null, _mem:null, summitFlash:0, msg:'', msgUntil:0
};
function mountain(){return MOUNTAINS[G.level%6];}
function roundIndex(){return Math.min(2,Math.floor(G.level/6));}
function basePoints(){return mountain().base[roundIndex()];}
function stepsToSummit(){return Math.ceil(mountain().m/METRES_PER_STEP);}
function elevation(){return G.steps*METRES_PER_STEP;}
/* ====================== audio (WebAudio, no assets) ======================= */
let actx=null;
function ac(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}
  catch(e){actx=null;}}if(actx&&actx.state==='suspended')actx.resume();}
function tone(type,f0,f1,dur,vol){
  if(!G.sound||!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,actx.currentTime);
  if(f1!==f0)o.frequency.linearRampToValueAtTime(f1,actx.currentTime+dur);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function noise(dur,vol){
  if(!G.sound||!actx)return;
  const n=Math.floor(actx.sampleRate*dur),b=actx.createBuffer(1,n,actx.sampleRate),
        d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=actx.createBufferSource(),g=actx.createGain();
  s.buffer=b;g.gain.value=vol;s.connect(g);g.connect(actx.destination);s.start();
}
function sfx(k){
  if(k==='step')tone('square',420,470,.04,.05);
  else if(k==='fall'){noise(.35,.18);tone('sawtooth',300,80,.4,.10);}
  else if(k==='summit'){tone('square',523,1046,.5,.12);}
  else if(k==='crash'){noise(.7,.24);tone('sawtooth',260,50,.8,.14);}
  else if(k==='bonus')tone('square',880,1600,.25,.10);
  else if(k==='extra')tone('square',700,1400,.4,.12);
}
/* ====================== SPEECH — the A-30 boundary ========================
   The Solid State Speech Synthesizer was SOLD SEPARATELY, so the game had to be
   complete without it. That makes this module's contract absolute:

       SPEECH MUST NEVER READ OR WRITE GAME STATE.

   It is passed a cue id and produces sound. Every cue has a paired on-screen
   visual, set by cue() below, INDEPENDENT of whether speech is on. Muting must
   therefore be unobservable in gameplay — tests.muteEquivalence() proves it over
   20 seeded games. If that test ever fails, the finding is wrong, not the test
   (see SCOPE "What would make me stop and ask").

   Phrases are the fragments actually recovered from sources; the full list is
   not preserved (ARCHAEOLOGY rung-8 open question 4).                       */
const CUES={
  lookout: {text:'LOOK OUT!',        voice:'f', why:'falling hazard incoming'},
  onward:  {text:'ONWARD AND UPWARD',voice:'m', why:'summit reached'},
  good:    {text:'GOOD MOVE, SPORT.',voice:'f', why:'knocked down (sarcasm)'},
  yuck:    {text:'YUCK!',            voice:'f', why:'skunk spray'},
  help:    {text:'HEEELP!',          voice:'m', why:'crashed to the bottom'}
};
const Speech={
  enabled(){return G.speech;},
  /* Formant-ish blips: two voices, female higher. Deliberately not words — the
     sound matters, the LPC silicon doesn't (series ruling since rung 2). */
  say(id){
    if(!G.speech||!G.sound||!actx)return;
    const c=CUES[id];if(!c)return;
    const base=c.voice==='f'?300:170;
    const syll=Math.max(2,Math.min(5,c.text.split(/[\s,!.]+/).filter(Boolean).length+1));
    for(let i=0;i<syll;i++){
      const t=actx.currentTime+i*.13;
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(base*(.85+.3*Math.random()),t);
      o.frequency.linearRampToValueAtTime(base*(.8+.35*Math.random()),t+.10);
      g.gain.setValueAtTime(.0001,t);
      g.gain.linearRampToValueAtTime(.07,t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+.11);
      o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.12);
    }
  }
};
/* The ONLY call site. Sets the visual (always) then asks Speech for audio
   (maybe). A-2: every cue is paired with a visual by construction. */
function cue(id){
  const c=CUES[id];if(!c)return;
  G.cue=id;G.cueUntil=G.now+1400;
  Speech.say(id);
}
/* ====================== terrain generation (A-8/A-9) ====================== */
/* Authored curve, randomised layout (A-32). Generation ASSERTS climbability by
   flood fill rather than hoping — the Munch Man self-validating-maze precedent. */
function hazardMix(level){
  /* v1 scales the MIX by level rather than claiming TI's per-mountain mapping,
     which is unconfirmed (ARCHAEOLOGY open question 5). */
  const n=Math.min(GROUND.length,3+Math.floor(level/2));
  return GROUND.slice(0,n);
}
function generate(seed){
  G.rng=mulberry32(seed>>>0);
  const rows=stepsToSummit()+1;                 /* row 0 = summit */
  const grid=[];
  const mix=hazardMix(G.level);
  const density=Math.min(.30,.12+G.level*.011); /* [AUTHORED] ramp */
  for(let r=0;r<rows;r++){
    const row=new Array(COLS).fill(null);
    if(r>0&&r<rows-2){
      for(let c=0;c<COLS;c++){
        if(G.rng()<density){
          row[c]=G.rng()<.28?'tree':mix[Math.floor(G.rng()*mix.length)];
        }
      }
    }
    grid.push(row);
  }
  G.grid=grid;G.rows=rows;
  if(!climbable(grid,rows)) return generate((seed*1664525+1013904223)>>>0);
  return grid;
}
/* A9: a path from the bottom row to row 0 using legal steps must exist.
   Trees block; everything else is passable at a cost. Wrap-around is legal (A6). */
function climbable(grid,rows){
  const seen=new Set();const stack=[];
  for(let c=0;c<COLS;c++)if(grid[rows-1][c]!=='tree'){stack.push([c,rows-1]);seen.add(c+','+(rows-1));}
  while(stack.length){
    const [c,r]=stack.pop();
    if(r===0)return true;
    for(let dc=-1;dc<=1;dc++)for(let dr=-1;dr<=1;dr++){
      if(!dc&&!dr)continue;
      const nr=r+dr;if(nr<0||nr>=rows)continue;
      const nc=(c+dc+COLS)%COLS;                /* cylinder */
      if(grid[nr][nc]==='tree')continue;
      const k=nc+','+nr;if(seen.has(k))continue;
      seen.add(k);stack.push([nc,nr]);
    }
  }
  return false;
}
/* ====================== falling hazards (A13/A14) ========================= */
/* Substepped per INV-1, and the step vector is recomputed INSIDE the loop from
   current velocity per INV-12 — a bounce or speed change mid-frame must not
   leave the remainder of the frame travelling the old vector. */
function fallClasses(){
  const out=['rock'];
  if(G.level>=6)out.push('avalanche');          /* level 7 (0-indexed 6) */
  if(G.level>=12)out.push('icefall');           /* level 13 */
  return out;
}
const FALL={
  rock:     {col:'gray',      spd:5.0, ch:'o'},
  avalanche:{col:'white',     spd:6.5, ch:'#'},
  icefall:  {col:'cyan',      spd:8.0, ch:'^'}
};
function spawnFalling(){
  const cls=fallClasses();
  const t=cls[Math.floor(G.rng()*cls.length)];
  const speed=Math.min(14,FALL[t].spd*(1+G.level*.045));  /* A-18 authored cap */
  G.falling.push({t,col:(G.col+Math.floor(G.rng()*9)-4+COLS)%COLS,
    y:G.row-VIEW_ROWS*.6,vy:speed});
  cue('lookout');                               /* visual ALWAYS; voice maybe */
}
function stepFalling(dt){
  const sec=dt/1000;
  const SUB=6;                                   /* INV-1: never travel > 1 cell */
  for(let i=G.falling.length-1;i>=0;i--){
    const f=G.falling[i];
    let hit=false;
    for(let s=0;s<SUB&&!hit;s++){
      const dy=f.vy*sec/SUB;                     /* INV-12: recomputed in-loop */
      f.y+=dy;
      if(f.col===G.col&&Math.abs(f.y-G.row)<.55){hit=true;}
    }
    if(hit){
      G.falling.splice(i,1);
      knockDown(4);
      /* knockDown can cascade into loseLife -> respawn(), which REBUILDS
         G.falling. Continuing to index the old array reads undefined.
         Found by the skillRatio bot: "Cannot read properties of undefined
         (reading 'vy')". INV-12's cousin — that one cached a stale step
         vector, this caches a stale loop bound over a collection the body
         is allowed to replace. */
      return;
    }
    if(f.y>G.rows+2)G.falling.splice(i,1);
  }
}
/* ====================== knock-downs and cascades (A10/A11/A12) ============ */
function knockDown(steps){
  if(steps<0){crashToBottom();return;}
  let guard=0;let total=0;
  let r=G.row;
  while(guard++<24){
    const nr=Math.min(G.rows-1,r+steps);
    total+=nr-r;
    r=nr;
    if(r>=G.rows-1)break;
    const h=G.grid[r][G.col];
    if(h&&HAZ[h].pen>0){steps=HAZ[h].pen;if(h==='skunk'){steps+=HAZ.skunk.spray;cue('yuck');}
      continue;}
    if(h==='snowman'){crashToBottom();return;}
    break;
  }
  G.row=r;                                       /* INV-20: exact assignment */
  G.steps=Math.max(0,G.rows-1-G.row);
  sfx('fall');
  if(total>0&&G.rng()<.5)cue('good');
  if(G.row>=G.rows-1)loseLife();
}
function crashToBottom(){
  G.row=G.rows-1;G.steps=0;sfx('crash');cue('help');loseLife();
}
function loseLife(){
  G.lives--;
  if(G.lives<=0){G.state='over';startEntryOrTitle(G.score);return;}
  respawn();                                     /* INV-5: rebuild, not repair */
}
/* INV-11: one function per lifecycle EVENT, named for the event, no boolean. */
function respawn(){
  G.col=16;G.row=G.rows-1;G.steps=0;G.falling=[];
  G.timer=CLIMB_SECONDS[roundIndex()];
  G.lastStepAt=G.now;G.camera=clampCam(G.row);
}
function startLevel(){
  generate(G.seed+G.level*7919);
  G.col=16;G.row=G.rows-1;G.steps=0;G.falling=[];
  G.timer=CLIMB_SECONDS[roundIndex()];
  G.lastStepAt=G.now;G.camera=clampCam(G.row);
  /* spawnAcc is module-level and was NOT being cleared, so a new game inherited
     the previous one's spawn phase — the same seed produced different hazard
     timing depending on what had been played before. This is what failed
     muteEquivalence (7/20) and noLeakAcrossRestarts; it looked like speech
     contaminating state and was nothing of the kind. INV-5: reset rebuilds. */
  spawnAcc=0;
}
function newGame(opts){
  opts=opts||{};
  G.score=0;G.lives=opts.lives||START_LIVES;G.level=opts.level||0;
  G.seed=opts.seed||((Math.random()*1e9)|0);
  G.testScore=!!opts.test;G.falling=[];G.cue=null;
  G.state='play';G.paused=false;
  startLevel();
}
/* ====================== summit and scoring (A17) ========================== */
function reachSummit(){
  const secs=Math.max(0,Math.floor(G.timer));
  const bonus=2*basePoints()*secs;               /* manual, verbatim */
  G.score+=bonus;
  sfx('summit');cue('onward');
  G.msg='SUMMIT! +'+bonus+' BONUS';G.msgUntil=G.now+2200;
  const wasLast=(G.level%6)===5;
  G.level++;
  if(wasLast){G.lives++;sfx('extra');}           /* +1 climber per round */
  if(G.level>17){                                /* A19: authored continuation */
    G.level=17;
  }
  startLevel();
}
/* ====================== movement (A5/A6/A15) ============================== */
/* Cell-quantised. Position is INTEGER col/row at all times — there is no float
   to accumulate, which is INV-20 satisfied by construction rather than by
   tolerance. Rendering interpolates; logic never does. */
function tryStep(dc,dr){
  if(G.state!=='play')return false;
  const nr=G.row+dr;
  if(nr<0||nr>=G.rows)return false;
  const nc=(G.col+dc+COLS)%COLS;                 /* A6: cylinder */
  if(G.grid[nr][nc]==='tree')return false;       /* trees block, cost nothing */
  G.col=nc;G.row=nr;                             /* exact assignment */
  if(dr<0){G.steps++;G.score+=basePoints();}
  else if(dr>0)G.steps=Math.max(0,G.steps-1);
  G.lastStepAt=G.now;
  sfx('step');
  const h=G.grid[G.row][G.col];
  if(h&&h!=='tree'){
    G.grid[G.row][G.col]=null;
    if(h==='snowman'){crashToBottom();return true;}
    const def=HAZ[h];
    if(def.bonus&&G.rng()<.35){                  /* A18 [ASSUMED trigger] */
      G.score+=def.bonus;sfx('bonus');
      G.msg=h.toUpperCase()+' BONUS +'+def.bonus;G.msgUntil=G.now+1600;
    } else {
      let pen=def.pen;
      if(h==='skunk'){pen+=def.spray;cue('yuck');}
      knockDown(pen);
    }
  }
  if(G.row===0)reachSummit();
  return true;
}
function clampCam(row){
  const target=row-Math.floor(VIEW_ROWS*.68);
  return Math.max(0,Math.min(G.rows-VIEW_ROWS,target));
}
/* ====================== the inverted timer (A-31 / A15) =================== */
/* Manual, verbatim: "Time allotted for your climb is not counted down except
   when the Alpiner is not moving." Waiting out a rockslide is free; dithering
   about where to go is what costs you. */
function stepTimer(dt){
  const moving=(G.now-G.lastStepAt)<STILL_MS;
  if(moving)return;
  G.timer-=dt/1000;
  if(G.timer<=0){G.timer=0;crashToBottom();}
}
/* ====================== main update ======================================= */
let spawnAcc=0;
function update(dt){
  G.now+=dt;
  if(G.state!=='play'||G.paused)return;
  stepTimer(dt);
  stepFalling(dt);
  spawnAcc+=dt;
  const every=Math.max(700,2200-G.level*90);
  if(spawnAcc>every){spawnAcc=0;if(G.rng()<.75)spawnFalling();}
  G.camera=clampCam(G.row);
  if(G.cue&&G.now>G.cueUntil)G.cue=null;
}
/* ====================== rendering ========================================= */
function px(c,r,col){cx.fillStyle=TI[col];cx.fillRect(c*CELL,(r-G.camera)*CELL,CELL,CELL);}
function glyph(c,r,ch,col){
  cx.fillStyle=TI[col];cx.font='8px monospace';cx.textAlign='center';
  cx.textBaseline='middle';
  cx.fillText(ch,c*CELL+CELL/2,(r-G.camera)*CELL+CELL/2+1);
}
function draw(){
  cx.fillStyle=TI.black;cx.fillRect(0,0,256,192);
  if(G.state==='title'){drawTitle();return;}
  if(G.state==='entry'){drawEntry();return;}
  /* mountain face: darker as you climb (altitude), cell-quantised (A-33) */
  for(let vr=0;vr<VIEW_ROWS;vr++){
    const r=G.camera+vr;if(r<0||r>=G.rows)continue;
    const frac=1-r/G.rows;
    const band=frac>.82?'white':frac>.55?'gray':frac>.28?'darkGreen':'mediumGreen';
    for(let c=0;c<COLS;c++){
      cx.fillStyle=TI[band];
      cx.globalAlpha=.16;cx.fillRect(c*CELL,vr*CELL,CELL,CELL);cx.globalAlpha=1;
    }
    if(r===0){for(let c=0;c<COLS;c++)px(c,r,'lightYellow');}
  }
  for(let vr=0;vr<VIEW_ROWS;vr++){

  /* deterministic scripted game: a fixed input tape, no randomness in the bot */
  sim.reset({seed});
  let mi=0;
  for(let i=0;i<steps;i++){
    const m=moves[mi++%moves.length];
    sim.input.up=m==='u';sim.input.down=m==='d';
    sim.input.left=m==='l';sim.input.right=m==='r';
    if(m==='.')sim.input.up=sim.input.down=sim.input.left=sim.input.right=false;
    sim.step(16.7);
    if(G.state!=='play')break;
  }
  const o=sim.observe();
  return[o.score,o.state,o.steps,o.lives,o.elevation].join('|');

       walked into trees, and a climber pushing against a tree genuinely IS
       standing still, so the clock correctly ran. The test was wrong, not the
       game. Clear the terrain so "continuous stepping" actually is continuous. */
    for(let r=0;r<G.rows;r++)for(let c=0;c<COLS;c++)G.grid[r][c]=null;
    G.row=G.rows-1;G.col=16;
    const t0=G.timer;
    /* 5 seconds of continuous stepping */
    for(let i=0;i<300;i++){sim.input.up=true;sim.step(16.7);
      if(G.row===0){G.row=G.rows-1;}}
    const movingCost=t0-G.timer;
    sim.reset({seed:77});
    const t1=G.timer;
    sim.input.up=false;
    G.lastStepAt=G.now-STILL_MS-1;
    for(let i=0;i<300;i++)sim.step(16.7);
    const stillCost=t1-G.timer;
    return{pass:movingCost===0&&stillCost>4.5&&stillCost<5.6,
      detail:'5s stepping cost '+movingCost.toFixed(2)+'s; 5s standing cost '+
        stillCost.toFixed(2)+'s'};
  },
  /* ---- A16/A17: lives and scoring ---- */
  scoreTable(){
    const want=[[10,20,30],[12,24,36],[15,30,45],[20,40,60],[25,50,75],[30,60,90]];
    const ok=MOUNTAINS.every((m,i)=>m.base.every((v,j)=>v===want[i][j]));
    return{pass:ok,detail:ok?'all 18 base-point values exact':'MISMATCH'};
  },
  summitBonus(){
    sim.reset({seed:3});
    G.level=0;G.timer=10;const before=G.score;
    const expect=2*basePoints()*10;
    reachSummit();
    const got=G.score-before;
    return{pass:got===expect,detail:'bonus '+got+' vs 2 x '+MOUNTAINS[0].base[0]+
      ' x 10s = '+expect};
  },
  startingLives(){
    sim.reset({seed:4});
    return{pass:G.lives===4,detail:G.lives+' climbers (3 reserve + 1 on screen)'};
  },
  extraClimberPerRound(){
    sim.reset({seed:5});
    G.level=5;const before=G.lives;G.timer=1;
    reachSummit();
    return{pass:G.lives===before+1,detail:'lives '+before+' -> '+G.lives+' on summiting Everest'};
  },
  /* ---- A20: test-score honesty ---- */
  testScoreExcluded(){
    HiScore.clear();
    G.testScore=true;G.score=999999;startEntryOrTitle(G.score);
    const leaked=HiScore.list().some(e=>e.s===999999);
    const wentToTitle=G.state==='title';
    G.testScore=false;
    return{pass:!leaked&&wentToTitle,
      detail:'test score '+(leaked?'LEAKED to leaderboard':'excluded')+
        '; routed to '+G.state};
  },
  /* ---- A21: hygiene ---- */
  noLeakAcrossRestarts(){
    const counts=[];
    for(let i=0;i<5;i++){
      sim.reset({seed:1234});
      for(let s=0;s<200;s++){sim.input.up=true;sim.step(16.7);}
      counts.push(G.falling.length+':'+G.rows);
    }
    sim.reset({seed:1234});
    const first=counts[0];
    return{pass:counts.every(c=>c===first),detail:'5 restarts -> '+counts.join(' ')};
  },
  /* ---- A22/A23: sim evidence, as ratios against a null ---- */
  skillRatio(){
    const run=(smart)=>{
      let summits=0;
      for(let g=0;g<100;g++){
        sim.reset({seed:20000+g,level:0});
        for(let i=0;i<4000;i++){
          if(smart){
            const danger=G.falling.some(f=>f.col===G.col&&f.y<G.row&&f.y>G.row-6);
            sim.input.up=!danger;
            sim.input.left=danger&&(g%2===0);sim.input.right=danger&&(g%2===1);
            sim.input.down=false;
          } else {
            const r=Math.random();
            sim.input.up=r<.25;sim.input.down=r<.5&&r>=.25;
            sim.input.left=r<.75&&r>=.5;sim.input.right=r>=.75;
          }
          sim.step(16.7);
          if(G.state!=='play')break;
          if(G.level>0){summits++;break;}
        }
      }
      return summits;
    };
    const smart=run(true), dumb=run(false);
    const ratio=dumb===0?(smart>0?Infinity:0):smart/dumb;
    return{pass:smart>=10*Math.max(1,dumb),
      detail:'hazard-aware '+smart+'/100 vs random-walk '+dumb+
        '/100 summits (ratio '+(ratio===Infinity?'inf':ratio.toFixed(1))+'x)'};
  },
  waitingPays(){
    /* The A-31 proof. First version scored 0.99x — but its "patient" bot merely
       stopped climbing while staying in the hazard's column, which dodges
       nothing: a rock falling down your column hits you standing or moving.
       That measured hesitation, not patience. The strategy the free clock is
       supposed to reward is: step ASIDE, let the hazard pass, resume. This bot
       expresses that. Whatever number it returns is reported as-is (INV-13) —
       a null result here is evidence against A-31 being earned by OUR build,
       and it gets written up, not tuned away. */
    const run=(waits)=>{
      let total=0;
      for(let g=0;g<100;g++){
        sim.reset({seed:40000+g,level:0});
        for(let i=0;i<3000;i++){
          const inLane=G.falling.some(f=>f.col===G.col&&f.y<G.row&&f.y>G.row-8);
          if(waits&&inLane){
            /* dodge sideways, then hold until the lane is clear */
            sim.input.up=false;
            sim.input.left=(g%2===0);sim.input.right=(g%2===1);
          } else {
            sim.input.up=true;sim.input.left=false;sim.input.right=false;
          }
          sim.step(16.7);
          if(G.state!=='play')break;
        }
        total+=G.score;
      }
      return total;
    };
    const patient=run(true), rusher=run(false);
    const ratio=rusher===0?Infinity:patient/rusher;
    return{pass:patient>=2*Math.max(1,rusher),
      detail:'waiting bot '+patient+' vs rushing bot '+rusher+
        ' total score (ratio '+(ratio===Infinity?'inf':ratio.toFixed(2))+'x)'};
  },
  run(){
    const names=['muteEquivalence','cueVisualPairing','mountainTable','elevationDerived',
      'containment','wrapAround','seedDeterminism','layoutVariety','allClimbable',
      'penaltyTable','knockDownArithmetic','cascadeTerminates','fallingSubstep',
      'fallSpeedCeiling','fallClassUnlocks','invertedTimer','scoreTable','summitBonus',
      'startingLives','extraClimberPerRound','testScoreExcluded','noLeakAcrossRestarts',
      'skillRatio','waitingPays'];
    const out=[];let pass=0;
    for(const n of names){
      let r;
      try{r=tests[n]();}catch(e){r={pass:false,detail:'THREW '+e.message};}
      if(r.pass)pass++;
      out.push((r.pass?'PASS':'FAIL')+'  '+n+'  —  '+r.detail);
    }
    G.state='title';
    return{passed:pass,total:names.length,
      lines:out,summary:pass+'/'+names.length+' PASS'};
  }
};
/* ====================== exposure ========================================= */
window.__alpiner={
  get state(){return G.state;},
  get score(){return G.score;},
  game:G, sim, HiScore, LETTERS, startEntryOrTitle, Feedback, tests,
  TI, MOUNTAINS, HAZ, CUES, Speech, newGame,
  climbable:()=>climbable(G.grid,G.rows),
  /* INV-6 applied to the RENDERER, not just the state. Verification harnesses
     run in panes where requestAnimationFrame never fires, so frame() never
     calls draw() and the canvas reads as 49,152 black pixels — indistinguishable
     from a game that draws nothing. A renderer with no programmatic handle can
     only be checked by a human looking at it, which is exactly the hole INV-6
     was written to close. Call this, then sample the canvas. */
  render(){draw();return{w:cv.width,h:cv.height};}
};
</script>
