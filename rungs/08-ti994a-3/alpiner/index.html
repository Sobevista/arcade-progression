<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ALPINER — rung 8 (TI-99/4A class)</title>
<style>
  /* Rung 8 of the arcade progression. One file, zero external requests.
     TI-99/4A class climbing game, after Alpiner (Texas Instruments, 1982,
     programmed by Janet Srimushnam). Palette: TMS9918A 15 colours + transparent.
     THE RUNG'S THESIS (A-30): the speech synthesizer was sold separately, so the
     cartridge had to be complete without it — therefore speech CANNOT carry
     load-bearing information. Here that is enforced, not narrated: Speech never
     touches game state, and tests.muteEquivalence() proves it. */
  html,body{margin:0;padding:0;background:#000;color:#fff;font-family:monospace;
    height:100%;overflow:hidden;-webkit-user-select:none;user-select:none;
    touch-action:none}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center}
  #topRow{display:flex;gap:6px;margin:4px 0;z-index:5;flex-wrap:wrap;
    justify-content:center}
  #topRow button{background:#000;color:#0dd;border:1px solid #444;font-family:monospace;
    font-size:13px;padding:6px 12px;border-radius:4px}
  #topRow button:active{background:#333}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;
    display:block}
  .ctl{position:fixed;bottom:10px;display:none;background:rgba(60,60,60,.35);
    border:2px solid #666;border-radius:10px;color:#fff;font-size:34px;
    width:190px;height:76px;z-index:6;font-family:monospace;text-align:center;
    line-height:70px}
  .touch .ctl{display:block}
  #bL{left:10px}
  #bR{right:10px}
  #bU,#bD{position:fixed;display:none;background:rgba(60,60,60,.35);border:2px solid #666;
    border-radius:10px;color:#fff;font-size:26px;width:110px;height:56px;z-index:6;
    font-family:monospace;text-align:center;line-height:52px;left:50%;
    margin-left:-55px}
  .touch #bU,.touch #bD{display:block}
  #bU{bottom:92px}
  #bD{bottom:10px}
  #fb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;z-index:20;
    align-items:center;justify-content:center}
  #fb.open{display:flex}
  #fbBox{background:#111;border:2px solid #0dd;border-radius:8px;padding:14px;
    width:min(480px,92vw)}
  #fbBox h2{margin:0 0 8px;font-size:15px;color:#0dd}
  #fbText{width:100%;height:90px;background:#000;color:#fff;border:1px solid #444;
    font-family:monospace;font-size:13px;box-sizing:border-box}
  #fbBox button{background:#000;color:#fff;border:1px solid #666;font-family:monospace;
    padding:6px 10px;margin:8px 6px 0 0;border-radius:4px}
  #fbNote{font-size:11px;color:#888;margin-top:6px}
</style>
</head>
<body>
<div id="topRow">
  <button id="bP">PAUSE</button><button id="bT">TITLE</button>
  <button id="bS">SOUND:ON</button><button id="bV">SPEECH:ON</button>
  <button id="bF">FEEDBACK</button>
</div>
<canvas id="screen" width="256" height="192"></canvas>
<div id="bL" class="ctl">&#9664;</div>
<div id="bR" class="ctl">&#9654;</div>
<div id="bU">&#9650;</div>
<div id="bD">&#9660;</div>
<div id="fb"><div id="fbBox">
  <h2>PLAYTEST FEEDBACK — game is paused</h2>
  <textarea id="fbText" placeholder="What happened? What felt wrong or right?"></textarea>
  <div>
    <button id="fbGit">OPEN GITHUB ISSUE</button>
    <button id="fbCopy">COPY REPORT</button>
    <button id="fbClose">CLOSE</button>
  </div>
  <div id="fbNote">Context (state, score, mountain) is attached automatically.</div>
</div></div>
<script>
'use strict';
/* ====================== TMS9918A palette ================================== */
/* 15 colours + transparent, fixed in the chip — not programmable. [ASSUMED RGB:
   the VDP emitted analog values; every RGB table is a reconstruction — A-9's kin,
   same caveat carried since rung 5.] */
const TI={
  transparent:'#000000', black:'#000000',
  mediumGreen:'#21c842', lightGreen:'#5edc78',
  darkBlue:'#5455ed',    lightBlue:'#7d76fc',
  darkRed:'#d4524d',     cyan:'#42ebf5',
  mediumRed:'#fc5554',   lightRed:'#ff7978',
  darkYellow:'#d4c154',  lightYellow:'#e6ce80',
  darkGreen:'#21b03b',   magenta:'#c95bba',
  gray:'#cccccc',        white:'#ffffff'
};
/* ====================== sprites ==========================================
   8x8 monochrome patterns — one colour per sprite, which is what the TMS9918A
   actually enforced (A-33). Drawn as pixels, not as letters.

   v1 of this file rendered every hazard as a monospace CHARACTER ('T' for tree,
   's' for skunk, '~' for snake) and shipped that as a finished rung. Daniel's
   first look: "that is a bunch of letters on a screen." He was right, and the
   instrument I had pointed at it made it worse — I sampled the canvas, counted
   42,421 non-black pixels, and read that as "the renderer works." Counting lit
   pixels does not measure whether anything is legible; typography lights pixels
   too. INV-13 exactly: the proxy was easy to compute because it had dropped the
   hard part of the task. */
const P={
  tree:     '...XX.....XXXX...XXXXXX...XXXX...XXXXXX.XXXXXXXX...XX......XX...',
  stump:    '..................XXXX...XXXXXX..XXXXXX...XXXX.....XXXX...XXXXXX',
  skunk:    '......X......XX.....XX...XXXXX..XXXXXXX.XXXXXXX..X.X.X..........',
  snake:    '..........XX......X..X..XX..X...XX.X.X.X...X...X.......XX.......',
  bat:      '........X......XXX....XXXXXXXXXX.XX.XX....X..X..................',
  fire:     '...X......XX......XXX....XXXXX...XXXXX..XXXXXXX.XXXXXXX..XXXXX..',
  bear:     '.X....X.XXX..XXX.XXXXXX..XXXXXX.XXXXXXXXXXXXXXXXX.XXXX.XX......X',
  lion:     '.XXXXXX.XXXXXXXXXX.XX.XXXXXXXXXX.XXXXXX...XXXX...X.XX.X..X....X.',
  vulture:  '...XX...XX.XX.XXXXXXXXXXXXXXXXXX.XXXXXX...X..X..................',
  ram:      'XX....XXX.X..X.XX..XX..X.XXXXXX..XXXXXX.XXXXXXXX.X.XX.X..X....X.',
  snowman:  '..XXXX...XXXXXX..X.XX.X..XXXXXX.XXXXXXXXXXXXXXXXX.XXXX.XX.X..X.X',
  climber:  '..XXX.....XXX....XXXXX..XXXXXXX...XXX.....XXX....XX.XX...X...X..',
  rock:     '..........XXX....XXXXX..XXXXXXX.XXXXXXX..XXXXX....XXX...........',
  avalanche:'.XX..XX.XXXXXXXXXXXXXXXX.XXXXXX.XX.XX.XXXXXXXXXX.XX..XX.........',
  icefall:  'XXXXXXXXXXXXXXXX.XXXXXX..XXXXXX...XXXX....XXXX.....XX.......X...',
  flag:     '..X.......XXXX....XXXXX...XXXX....X.......X.......X.......X.....'
};
/* 16x16 patterns. The TMS9918A supported 16x16 sprites and a 2x magnification
   bit, and Alpiner's climber is plainly a big sprite in the reference shot, so
   the hero and the large animals get the bigger cell. */
const P16={
  /* climber: head, pack, torso, two legs mid-stride */
  climber:
    '......XXXX......'+
    '.....XXXXXX.....'+
    '.....XX..XX.....'+
    '.....XXXXXX.....'+
    '......XXXX......'+
    '...XXXXXXXXXX...'+
    '..XXXXXXXXXXXX..'+
    '.XXXXXXXXXXXXXX.'+
    '.XX.XXXXXXXX.XX.'+
    '.XX.XXXXXXXX.XX.'+
    '....XXXXXXXX....'+
    '....XXX..XXX....'+
    '....XX....XX....'+
    '...XXX....XXX...'+
    '..XXX......XXX..'+
    '.XXX........XXX.',
  /* a big quadruped — the bear/lion/ram silhouette class */
  beast:
    '................'+
    '.XX..........XX.'+
    '.XXX........XXX.'+
    '..XXXXXXXXXXXX..'+
    '.XXXXXXXXXXXXXX.'+
    'XXXXXXXXXXXXXXXX'+
    'XXX.XXXXXXXX.XXX'+
    'XXXXXXXXXXXXXXXX'+
    'XXXXXXXXXXXXXXXX'+
    '.XXXXXXXXXXXXXX.'+
    '..XXXXXXXXXXXX..'+
    '..XX.XX..XX.XX..'+
    '..XX.XX..XX.XX..'+
    '..XX.XX..XX.XX..'+
    '.XXX.XXX.XXX.XXX'+
    '................'
};
/* split the figure into a top pass and a legs pass, plus a fattened outline so
   he reads against both white stone and cyan sky */
P16.climberTop =P16.climber.split('').map((ch,i)=>i< 9*16?ch:'.').join('');
P16.climberLegs=P16.climber.split('').map((ch,i)=>i>=9*16?ch:'.').join('');
P16.climberOutline=(()=>{
  const a=P16.climber.split('');const o=new Array(256).fill('.');
  for(let i=0;i<256;i++){
    if(a[i]!=='X')continue;
    const x=i%16,y=(i/16)|0;
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const nx=x+dx,ny=y+dy;
      if(nx<0||nx>15||ny<0||ny>15)continue;
      o[ny*16+nx]='X';
    }
  }
  return o.join('');
})();
function sprite16(name,col){
  const k='16'+name+'|'+col;
  if(SPR[k])return SPR[k];
  const c=document.createElement('canvas');c.width=16;c.height=16;
  const g=c.getContext('2d');g.fillStyle=TI[col]||col;
  const pat=P16[name]||'';
  for(let i=0;i<256;i++)if(pat[i]==='X')g.fillRect(i%16,(i/16)|0,1,1);
  SPR[k]=c;return c;
}
/* Pre-rendered into little canvases, one per (sprite, colour). */
const SPR={};
function sprite(name,col){
  const k=name+'|'+col;
  if(SPR[k])return SPR[k];
  const c=document.createElement('canvas');c.width=8;c.height=8;
  const g=c.getContext('2d');g.fillStyle=TI[col]||col;
  const pat=P[name]||'';
  for(let i=0;i<64;i++)if(pat[i]==='X')g.fillRect(i%8,(i/8)|0,1,1);
  SPR[k]=c;return c;
}
/* ====================== sourced constants ================================= */
/* Every number in this block comes from the TI Alpiner manual (archive.org item
   AlpinerManual) unless tagged. See ARCHAEOLOGY.md rung 8. */
const METRES_PER_STEP=46;                       /* manual, verbatim */
const MOUNTAINS=[                               /* strict ascending elevation */
  {name:'MT. HOOD',      m:3427, base:[10,20,30]},
  {name:'MATTERHORN',    m:4477, base:[12,24,36]},
  {name:'MT. KENYA',     m:5193, base:[15,30,45]},
  {name:'MT. MCKINLEY',  m:6194, base:[20,40,60]},
  {name:'MT. GARMO',     m:7495, base:[25,50,75]},
  {name:'MT. EVEREST',   m:8848, base:[30,60,90]}
];
/* Eleven obstacles + the Snowman. "pen" = steps knocked down (manual table). */
const HAZ={
  tree:      {pen:0,  col:'darkGreen',   ch:'T', blocks:true },
  stump:     {pen:2,  col:'darkYellow',  ch:'n'},
  skunk:     {pen:2,  col:'white',       ch:'s', spray:2},
  snake:     {pen:3,  col:'mediumGreen', ch:'~'},
  bat:       {pen:5,  col:'magenta',     ch:'v'},
  fire:      {pen:5,  col:'mediumRed',   ch:'*'},
  bear:      {pen:6,  col:'darkRed',     ch:'B', bonus:500},
  lion:      {pen:7,  col:'lightYellow', ch:'L', bonus:750},
  vulture:   {pen:8,  col:'gray',        ch:'V'},
  ram:       {pen:9,  col:'lightRed',    ch:'R', bonus:1000},
  snowman:   {pen:-1, col:'white',       ch:'Y'}   /* -1 = crash to the bottom */
};
const GROUND=['stump','skunk','snake','bat','fire','bear','lion','vulture','ram'];
const COLS=32, VIEW_ROWS=18, CELL=8;   /* 18 rows of play, 48px info panel below */
const PANEL_Y=VIEW_ROWS*CELL;
/* The mountain is a SHAPE in sky, not a full-screen texture — the reference
   gameplay shot shows blue sky around a silhouette. It runs full width for most
   of the climb (which is what keeps the sourced wrap-around meaningful, A6) and
   narrows to a peak over the top stretch. */
/* A PYRAMID, all the way down — narrow at the peak, wide at the base, sky on
   both flanks the whole climb. This is what the reference gameplay shots
   actually show, and it is the single biggest reason our build did not read as
   Alpiner: we had a full-bleed rock texture where the original has a mountain
   SHAPE against cyan.
   Reconciling it with the manual's sourced wrap-around (A6): the wrap runs
   across the MOUNTAIN's width at your current row, not the screen's. Step off
   the left flank and you come back on the right flank of the same row. The
   mechanic survives; the silhouette is honoured. */
function halfWidth(r){
  const down=r/G.rows;                   /* 0 at the summit, 1 at the base */
  return Math.max(2,Math.round(2+down*14));
}
/* clamped to the real grid: halfWidth tops out at 16, which would give a span of
   0..32 — and column 32 does not exist, so every read of G.grid[r][32] came back
   undefined. An off-by-one at the widest part of the mountain, i.e. exactly where
   the player spends the first half of the climb. */
function rowSpan(r){
  const hw=halfWidth(r);
  return{lo:Math.max(0,16-hw),hi:Math.min(COLS-1,16+hw)};
}
function isRock(r,c){
  if(r<0||r>=G.rows)return false;
  const s=rowSpan(r);
  return c>=s.lo&&c<=s.hi;
}
/* wrap across the mountain's own width at this row */
function wrapCol(r,c){
  const s=rowSpan(r), w=s.hi-s.lo+1;
  return s.lo+(((c-s.lo)%w)+w)%w;
}
/* A ledge is a walkable shelf — drawn bright with a dark lip, the stacked-
   platform look of the original. Structural for the eye, not for traversal. */
function isLedge(r,c){
  if(!isRock(r,c))return false;
  return hash(r*3+1,(c>>1))>.52&&(r%2===0);
}
const START_LIVES=4;                            /* 3 reserve boots + 1 on screen */
const STEP_MS=110;                              /* input repeat rate [AUTHORED] */
const STILL_MS=260;                             /* "not moving" threshold, A-31 */
const CLIMB_SECONDS=[90,80,70];                 /* per round [AUTHORED] */
/* ====================== seeded RNG (A-32: same seed, same mountain) ======== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
/* ====================== game state ======================================== */
const cv=document.getElementById('screen'), cx=cv.getContext('2d');
cx.imageSmoothingEnabled=false;
const G={
  state:'title', score:0, lives:START_LIVES, level:0, round:0,
  col:16, row:0, rows:0, grid:null, camera:0, steps:0, timer:0,
  paused:false, sound:true, speech:true, testMode:false, testScore:false,
  cue:null, cueUntil:0, falling:[], seed:1, rng:null, lastStepAt:-1e9,
  now:0, entry:null, _mem:null, summitFlash:0, msg:'', msgUntil:0
};
function mountain(){return MOUNTAINS[G.level%6];}
function roundIndex(){return Math.min(2,Math.floor(G.level/6));}
function basePoints(){return mountain().base[roundIndex()];}
function stepsToSummit(){return Math.ceil(mountain().m/METRES_PER_STEP);}
function elevation(){return G.steps*METRES_PER_STEP;}
/* ====================== audio (WebAudio, no assets) ======================= */
let actx=null;
function ac(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}
  catch(e){actx=null;}}if(actx&&actx.state==='suspended')actx.resume();}
function tone(type,f0,f1,dur,vol){
  if(!G.sound||!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,actx.currentTime);
  if(f1!==f0)o.frequency.linearRampToValueAtTime(f1,actx.currentTime+dur);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function noise(dur,vol){
  if(!G.sound||!actx)return;
  const n=Math.floor(actx.sampleRate*dur),b=actx.createBuffer(1,n,actx.sampleRate),
        d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const s=actx.createBufferSource(),g=actx.createGain();
  s.buffer=b;g.gain.value=vol;s.connect(g);g.connect(actx.destination);s.start();
}
function sfx(k){
  if(k==='step')tone('square',420,470,.04,.05);
  else if(k==='fall'){noise(.35,.18);tone('sawtooth',300,80,.4,.10);}
  else if(k==='summit'){tone('square',523,1046,.5,.12);}
  else if(k==='crash'){noise(.7,.24);tone('sawtooth',260,50,.8,.14);}
  else if(k==='bonus')tone('square',880,1600,.25,.10);
  else if(k==='extra')tone('square',700,1400,.4,.12);
}
/* ====================== SPEECH — the A-30 boundary ========================
   The Solid State Speech Synthesizer was SOLD SEPARATELY, so the game had to be
   complete without it. That makes this module's contract absolute:

       SPEECH MUST NEVER READ OR WRITE GAME STATE.

   It is passed a cue id and produces sound. Every cue has a paired on-screen
   visual, set by cue() below, INDEPENDENT of whether speech is on. Muting must
   therefore be unobservable in gameplay — tests.muteEquivalence() proves it over
   20 seeded games. If that test ever fails, the finding is wrong, not the test
   (see SCOPE "What would make me stop and ask").

   Phrases are the fragments actually recovered from sources; the full list is
   not preserved (ARCHAEOLOGY rung-8 open question 4).                       */
const CUES={
  lookout: {text:'LOOK OUT!',        voice:'f', why:'falling hazard incoming'},
  onward:  {text:'ONWARD AND UPWARD',voice:'m', why:'summit reached'},
  good:    {text:'GOOD MOVE, SPORT.',voice:'f', why:'knocked down (sarcasm)'},
  yuck:    {text:'YUCK!',            voice:'f', why:'skunk spray'},
  help:    {text:'HEEELP!',          voice:'m', why:'crashed to the bottom'}
};
const Speech={
  enabled(){return G.speech;},
  /* Formant-ish blips: two voices, female higher. Deliberately not words — the
     sound matters, the LPC silicon doesn't (series ruling since rung 2). */
  say(id){
    if(!G.speech||!G.sound||!actx)return;
    const c=CUES[id];if(!c)return;
    const base=c.voice==='f'?300:170;
    const syll=Math.max(2,Math.min(5,c.text.split(/[\s,!.]+/).filter(Boolean).length+1));
    for(let i=0;i<syll;i++){
      const t=actx.currentTime+i*.13;
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='sawtooth';
      o.frequency.setValueAtTime(base*(.85+.3*Math.random()),t);
      o.frequency.linearRampToValueAtTime(base*(.8+.35*Math.random()),t+.10);
      g.gain.setValueAtTime(.0001,t);
      g.gain.linearRampToValueAtTime(.07,t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,t+.11);
      o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.12);
    }
  }
};
/* The ONLY call site. Sets the visual (always) then asks Speech for audio
   (maybe). A-2: every cue is paired with a visual by construction. */
function cue(id){
  const c=CUES[id];if(!c)return;
  G.cue=id;G.cueUntil=G.now+1400;
  Speech.say(id);
}
/* ====================== terrain generation (A-8/A-9) ====================== */
/* Authored curve, randomised layout (A-32). Generation ASSERTS climbability by
   flood fill rather than hoping — the Munch Man self-validating-maze precedent. */
function hazardMix(level){
  /* v1 scales the MIX by level rather than claiming TI's per-mountain mapping,
     which is unconfirmed (ARCHAEOLOGY open question 5). */
  const n=Math.min(GROUND.length,3+Math.floor(level/2));
  return GROUND.slice(0,n);
}
function generate(seed){
  G.rng=mulberry32(seed>>>0);
  const rows=stepsToSummit()+1;                 /* row 0 = summit */
  /* G.rows MUST be set before the loop: isRock() -> rowSpan() -> halfWidth()
     all read it, so generating with it still holding the PREVIOUS level's
     height silently shaped this mountain to the last one's proportions — and
     made RNG consumption depend on what had been played before, which is what
     dropped muteEquivalence to 11/20. Same class as the spawnAcc leak earlier
     this session: generation reading residual state. The thesis test has now
     caught two determinism bugs that had nothing to do with speech. */
  G.rows=rows;
  const grid=[];
  const mix=hazardMix(G.level);
  /* [AUTHORED] ramp. First pass ran .12 -> .30 and the screen read as clutter:
     a hazard in roughly every third cell leaves no clean ground to route
     through, so the wrap-around (A6) and the step-penalty grading (A10) both
     stop mattering — everything is a hazard, so nothing is a decision.
     Halved after looking at it. */
  const density=Math.min(.16,.055+G.level*.006);
  for(let r=0;r<rows;r++){
    const row=new Array(COLS).fill(null);
    if(r>0&&r<rows-2){
      for(let c=0;c<COLS;c++){
        if(!isRock(r,c))continue;          /* nothing stands in mid-air */
        if(G.rng()<density){
          row[c]=G.rng()<.28?'tree':mix[Math.floor(G.rng()*mix.length)];
        }
      }
    }
    grid.push(row);
  }
  G.grid=grid;G.rows=rows;
  if(!climbable(grid,rows)) return generate((seed*1664525+1013904223)>>>0);
  return grid;
}
/* A9: a path from the bottom row to row 0 using legal steps must exist.
   Trees block; everything else is passable at a cost. Wrap-around is legal (A6). */
function climbable(grid,rows){
  const seen=new Set();const stack=[];
  for(let c=0;c<COLS;c++)if(grid[rows-1][c]!=='tree'&&isRock(rows-1,c)){
    stack.push([c,rows-1]);seen.add(c+','+(rows-1));}
  while(stack.length){
    const [c,r]=stack.pop();
    if(r===0)return true;
    for(let dc=-1;dc<=1;dc++)for(let dr=-1;dr<=1;dr++){
      if(!dc&&!dr)continue;
      const nr=r+dr;if(nr<0||nr>=rows)continue;
      const nc=wrapCol(nr,c+dc);                /* wrap across the flank */
      if(!isRock(nr,nc))continue;               /* sky is not a route */
      if(grid[nr][nc]==='tree')continue;
      const k=nc+','+nr;if(seen.has(k))continue;
      seen.add(k);stack.push([nc,nr]);
    }
  }
  return false;
}
/* ====================== falling hazards (A13/A14) ========================= */
/* Substepped per INV-1, and the step vector is recomputed INSIDE the loop from
   current velocity per INV-12 — a bounce or speed change mid-frame must not
   leave the remainder of the frame travelling the old vector. */
function fallClasses(){
  const out=['rock'];
  if(G.level>=6)out.push('avalanche');          /* level 7 (0-indexed 6) */
  if(G.level>=12)out.push('icefall');           /* level 13 */
  return out;
}
const FALL={
  rock:     {col:'gray',      spd:5.0, ch:'o'},
  avalanche:{col:'white',     spd:6.5, ch:'#'},
  icefall:  {col:'cyan',      spd:8.0, ch:'^'}
};
function spawnFalling(){
  const cls=fallClasses();
  const t=cls[Math.floor(G.rng()*cls.length)];
  const speed=Math.min(14,FALL[t].spd*(1+G.level*.045));  /* A-18 authored cap */
  G.falling.push({t,col:(G.col+Math.floor(G.rng()*9)-4+COLS)%COLS,
    y:G.row-VIEW_ROWS*.6,vy:speed});
  cue('lookout');                               /* visual ALWAYS; voice maybe */
}
function stepFalling(dt){
  const sec=dt/1000;
  const SUB=6;                                   /* INV-1: never travel > 1 cell */
  for(let i=G.falling.length-1;i>=0;i--){
    const f=G.falling[i];
    let hit=false;
    for(let s=0;s<SUB&&!hit;s++){
      const dy=f.vy*sec/SUB;                     /* INV-12: recomputed in-loop */
      f.y+=dy;
      if(f.col===G.col&&Math.abs(f.y-G.row)<.55){hit=true;}
    }
    if(hit){
      G.falling.splice(i,1);
      knockDown(4);
      /* knockDown can cascade into loseLife -> respawn(), which REBUILDS
         G.falling. Continuing to index the old array reads undefined.
         Found by the skillRatio bot: "Cannot read properties of undefined
         (reading 'vy')". INV-12's cousin — that one cached a stale step
         vector, this caches a stale loop bound over a collection the body
         is allowed to replace. */
      return;
    }
    if(f.y>G.rows+2)G.falling.splice(i,1);
  }
}
/* ====================== knock-downs and cascades (A10/A11/A12) ============ */
function knockDown(steps){
  if(steps<0){crashToBottom();return;}
  let guard=0;let total=0;
  let r=G.row;
  while(guard++<24){
    const nr=Math.min(G.rows-1,r+steps);
    total+=nr-r;
    r=nr;
    if(r>=G.rows-1)break;
    const h=G.grid[r][G.col];
    if(h&&HAZ[h].pen>0){steps=HAZ[h].pen;if(h==='skunk'){steps+=HAZ.skunk.spray;cue('yuck');}
      continue;}
    if(h==='snowman'){crashToBottom();return;}
    break;
  }
  G.row=r;                                       /* INV-20: exact assignment */
  G.steps=Math.max(0,G.rows-1-G.row);
  sfx('fall');
  if(total>0&&G.rng()<.5)cue('good');
  if(G.row>=G.rows-1)loseLife();
}
function crashToBottom(){
  G.row=G.rows-1;G.steps=0;sfx('crash');cue('help');loseLife();
}
function loseLife(){
  G.lives--;
  if(G.lives<=0){G.state='over';startEntryOrTitle(G.score);return;}
  respawn();                                     /* INV-5: rebuild, not repair */
}
/* INV-11: one function per lifecycle EVENT, named for the event, no boolean. */
function respawn(){
  G.col=16;G.row=G.rows-1;G.steps=0;G.falling=[];
  G.timer=CLIMB_SECONDS[roundIndex()];
  G.lastStepAt=G.now;G.camera=clampCam(G.row);
}
function startLevel(){
  generate(G.seed+G.level*7919);
  G.col=16;G.row=G.rows-1;G.steps=0;G.falling=[];
  G.timer=CLIMB_SECONDS[roundIndex()];
  G.lastStepAt=G.now;G.camera=clampCam(G.row);
  /* spawnAcc is module-level and was NOT being cleared, so a new game inherited
     the previous one's spawn phase — the same seed produced different hazard
     timing depending on what had been played before. This is what failed
     muteEquivalence (7/20) and noLeakAcrossRestarts; it looked like speech
     contaminating state and was nothing of the kind. INV-5: reset rebuilds. */
  spawnAcc=0;
}
function newGame(opts){
  opts=opts||{};
  G.score=0;G.lives=opts.lives||START_LIVES;G.level=opts.level||0;
  G.seed=opts.seed||((Math.random()*1e9)|0);
  G.testScore=!!opts.test;G.falling=[];G.cue=null;
  G.state='play';G.paused=false;
  startLevel();
}
/* ====================== summit and scoring (A17) ========================== */
function reachSummit(){
  const secs=Math.max(0,Math.floor(G.timer));
  const bonus=2*basePoints()*secs;               /* manual, verbatim */
  G.score+=bonus;
  sfx('summit');cue('onward');
  G.msg='SUMMIT! +'+bonus+' BONUS';G.msgUntil=G.now+2200;
  const wasLast=(G.level%6)===5;
  G.level++;
  if(wasLast){G.lives++;sfx('extra');}           /* +1 climber per round */
  if(G.level>17){                                /* A19: authored continuation */
    G.level=17;
  }
  startLevel();
}
/* ====================== movement (A5/A6/A15) ============================== */
/* Cell-quantised. Position is INTEGER col/row at all times — there is no float
   to accumulate, which is INV-20 satisfied by construction rather than by
   tolerance. Rendering interpolates; logic never does. */
function tryStep(dc,dr){
  if(G.state!=='play')return false;
  const nr=G.row+dr;
  if(nr<0||nr>=G.rows)return false;
  const nc=wrapCol(nr,G.col+dc);                 /* A6: wrap across the flank */
  if(!isRock(nr,nc))return false;                /* you cannot step into sky */
  if(G.grid[nr][nc]==='tree')return false;       /* trees block, cost nothing */
  G.col=nc;G.row=nr;                             /* exact assignment */
  if(dr<0){G.steps++;G.score+=basePoints();}
  else if(dr>0)G.steps=Math.max(0,G.steps-1);
  G.lastStepAt=G.now;
  sfx('step');
  const h=G.grid[G.row][G.col];
  if(h&&h!=='tree'){
    G.grid[G.row][G.col]=null;
    if(h==='snowman'){crashToBottom();return true;}
    const def=HAZ[h];
    if(def.bonus&&G.rng()<.35){                  /* A18 [ASSUMED trigger] */
      G.score+=def.bonus;sfx('bonus');
      G.msg=h.toUpperCase()+' BONUS +'+def.bonus;G.msgUntil=G.now+1600;
    } else {
      let pen=def.pen;
      if(h==='skunk'){pen+=def.spray;cue('yuck');}
      knockDown(pen);
    }
  }
  if(G.row===0)reachSummit();
  return true;
}
function clampCam(row){
  const target=row-Math.floor(VIEW_ROWS*.68);
  return Math.max(0,Math.min(G.rows-VIEW_ROWS,target));
}
/* ====================== the inverted timer (A-31 / A15) =================== */
/* Manual, verbatim: "Time allotted for your climb is not counted down except
   when the Alpiner is not moving." Waiting out a rockslide is free; dithering
   about where to go is what costs you. */
function stepTimer(dt){
  const moving=(G.now-G.lastStepAt)<STILL_MS;
  if(moving)return;
  G.timer-=dt/1000;
  if(G.timer<=0){G.timer=0;crashToBottom();}
}
/* ====================== main update ======================================= */
let spawnAcc=0;
function update(dt){
  G.now+=dt;
  if(G.state!=='play'||G.paused)return;
  stepTimer(dt);
  stepFalling(dt);
  spawnAcc+=dt;
  const every=Math.max(700,2200-G.level*90);
  if(spawnAcc>every){spawnAcc=0;if(G.rng()<.75)spawnFalling();}
  G.camera=clampCam(G.row);
  if(G.cue&&G.now>G.cueUntil)G.cue=null;
}
/* ====================== rendering ========================================= */
function blit(name,col,x,y){cx.drawImage(sprite(name,col),Math.round(x),Math.round(y));}
/* deterministic per-cell noise so the rock face has grain instead of being a
   flat wash of colour — the thing that made v1 read as a spreadsheet */
/* A real 32-bit mixer. The first version was
     (r*73856093) ^ (c*19349663), then one shift-xor
   which loses precision on the multiplies (JS numbers are doubles, the products
   exceed 2^53's useful range for the XOR) and does not avalanche after a single
   round. Measured output for hash(8, 0..7): 0.138 0.133 0.131 0.126 0.155 0.152
   0.148 0.169 — a 0.04 spread where 0..1 was assumed. The terrain "noise" was
   therefore almost CONSTANT (0.232 across every column of a row), so the relief
   shading had nothing to shade and the face rendered flat.
   Caught by probing the distribution instead of squinting at the output — the
   picture told me something was wrong, the numbers told me what. */
function hash(r,c){
  let h=Math.imul(r|0,0x27d4eb2d)^Math.imul(c|0,0x165667b1);
  h=Math.imul(h^(h>>>15),0x85ebca6b);
  h=Math.imul(h^(h>>>13),0xc2b2ae35);
  return ((h^(h>>>16))>>>0)/4294967296;
}
/* The mountain face, by altitude band. Snow at the top, bare rock through the
   middle, treeline, then forested lower slopes. */
function faceBand(r){
  const frac=1-r/G.rows;
  if(frac>.80)return{base:'#dfe6f2',dark:'#b9c4d8',lite:'#ffffff',rock:true};
  if(frac>.62)return{base:'#9aa3b2',dark:'#6f7787',lite:'#c3ccdb',rock:true};
  if(frac>.40)return{base:'#6d6a5c',dark:'#4d4a40',lite:'#8d8a78',rock:true};
  if(frac>.20)return{base:'#2f5a33',dark:'#22421f',lite:'#3f7440'};
  return{base:'#2a6b30',dark:'#1d4a22',lite:'#3d8a3a'};
}
/* Smoothed low-frequency noise. The first version used raw per-cell hash, which
   produced a uniform dot lattice — it read as a fabric swatch, not as ground.
   Relief needs features BIGGER than one cell. */
function vnoise(r,c,scale){
  const rr=r/scale, cc=c/scale;
  const r0=Math.floor(rr), c0=Math.floor(cc);
  const fr=rr-r0, fc=cc-c0;
  const sr=fr*fr*(3-2*fr), sc=fc*fc*(3-2*fc);
  const h=(a,b)=>hash(a,((b%64)+64)%64);
  const a=h(r0,c0), b=h(r0,c0+1), d=h(r0+1,c0), e=h(r0+1,c0+1);
  return (a*(1-sc)+b*sc)*(1-sr)+(d*(1-sc)+e*sc)*sr;
}
function mix(hex1,hex2,t){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const A=p(hex1),B=p(hex2);
  return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+
    Math.round(A[2]+(B[2]-A[2])*t)+')';
}
/* The original's palette, read off the reference shots: bright cyan sky, a
   near-white masonry mountain, black mortar. Not grey rock, not a green field. */
const SKY='#5ee0f5', STONE='#f0f0f0', STONE_2='#d0d4d8', MORTAR='#101010';
function drawFace(){
  cx.fillStyle=SKY;cx.fillRect(0,0,256,PANEL_Y);
  for(let vr=0;vr<VIEW_ROWS;vr++){
    const r=G.camera+vr;if(r<0||r>=G.rows)continue;
    const y=vr*CELL;
    for(let c=0;c<COLS;c++){
      if(!isRock(r,c))continue;                 /* leave the sky showing */
      const x=c*CELL;
      /* irregular blocks: alternating courses, widths varied by hash, so it
         reads as stacked stone rather than as a grid of identical tiles */
      cx.fillStyle=(hash(r,c)>.72)?STONE_2:STONE;
      cx.fillRect(x,y,CELL,CELL);
      /* mortar: a course line along the top of every row, and vertical joints
         at irregular intervals offset per course */
      cx.fillStyle=MORTAR;
      cx.fillRect(x,y,CELL,1);
      const off=(r%2)?4:0;
      if(hash(r*7,c*3)>.42)cx.fillRect(x+off,y,1,CELL);
    }
    /* crisp black silhouette against the sky */
    const s=rowSpan(r);
    cx.fillStyle=MORTAR;
    cx.fillRect(s.lo*CELL,y,1,CELL);
    cx.fillRect(s.hi*CELL+CELL-1,y,1,CELL);
    /* the stepped edge: where this row is wider than the one above, cap it */
    const sa=rowSpan(r-1);
    if(r>0&&s.lo<sa.lo)cx.fillRect(s.lo*CELL,y,(sa.lo-s.lo)*CELL,1);
    if(r>0&&s.hi>sa.hi)cx.fillRect((sa.hi+1)*CELL,y,(s.hi-sa.hi)*CELL,1);
    if(r===0){
      cx.fillStyle=MORTAR;cx.fillRect(s.lo*CELL,y,(s.hi-s.lo+1)*CELL,1);
      blit('flag','mediumRed',16*CELL,y-CELL);
    }
  }
}
function draw(){
  cx.fillStyle=TI.black;cx.fillRect(0,0,256,192);
  if(G.state==='title'){drawTitle();return;}
  if(G.state==='entry'){drawEntry();return;}
  drawFace();
  /* the big animals get the 16x16 cell — they are the threats you must read
     from across the screen, and at 8x8 a bear and a stump were the same size */
  const BIG={bear:1,lion:1,ram:1,snowman:1};
  for(let vr=0;vr<VIEW_ROWS;vr++){
    const r=G.camera+vr;if(r<0||r>=G.rows)continue;
    for(let c=0;c<COLS;c++){
      const h=G.grid[r][c];if(!h)continue;
      if(BIG[h])cx.drawImage(sprite16('beast',HAZ[h].col),c*CELL-4,vr*CELL-8);
      else blit(h,HAZ[h].col,c*CELL,vr*CELL);
    }
  }
  for(const f of G.falling){
    if(f.y<G.camera-1||f.y>G.camera+VIEW_ROWS)continue;
    blit(f.t,FALL[f.t].col,f.col*CELL,(f.y-G.camera)*CELL);
  }
  /* The climber, drawn last so nothing can cover him — and in TWO overlapping
     passes to get a red top over green trousers. That is exactly how the
     hardware did multi-colour characters: TMS9918A sprites are monochrome, so a
     two-tone figure costs a second sprite from the four-per-scanline budget.
     The constraint is authentic; spending it here is the choice. */
  const cyPix=(G.row-G.camera)*CELL, hx=G.col*CELL-4, hy=cyPix-8;
  cx.drawImage(sprite16('climberOutline','black'),hx,hy);
  cx.drawImage(sprite16('climberTop','#d02b1e'),hx,hy);
  cx.drawImage(sprite16('climberLegs','#1c8b2a'),hx,hy);
  drawHud();
}
/* The info panel sits at the BOTTOM on a tan field — the layout of the original,
   which puts LEVEL / CURRENT ELEV on the left and the score column on the right. */
function drawHud(){
  cx.fillStyle='#d4c154';cx.fillRect(0,PANEL_Y,256,192-PANEL_Y);
  cx.fillStyle='#8f8033';cx.fillRect(0,PANEL_Y,256,2);

  if(G.cue){

    cx.fillStyle=c.voice==='f'?TI.magenta:TI.cyan;

  if(G.msg&&G.now<G.msgUntil){
    cx.fillStyle='#ffffff';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(28,PANEL_Y-46,200,16);
    cx.fillStyle=TI.lightYellow;cx.fillText(G.msg,128,PANEL_Y-38);

    cx.fillText('PAUSED',128,72);}
}
function drawTitle(){

function drawEntry(){

/* ====================== high score table (shared protocol) ================ */
const KEY='arcade.alpiner.scores';
const HiScore={
  list(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):[];}catch(e){return G._mem||[];}},
  save(l){try{localStorage.setItem(KEY,JSON.stringify(l));}catch(e){G._mem=l;}},
  qualifies(s){const l=HiScore.list();return s>0&&(l.length<8||s>l[l.length-1].s);},
  add(n,s){let l=HiScore.list();l.push({n,s});l.sort((a,b)=>b.s-a.s);l=l.slice(0,8);HiScore.save(l);},
  clear(){HiScore.save([]);}
};
/* INV-15 corollary: a character that is also a control can never be entered.
   SPACE confirms, so SPACE is not in the alphabet. */
const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-.';
function startEntryOrTitle(score){
  /* A20: a Test Score is never eligible for the leaderboard (TI's own honesty
     law, adopted from Munch Man on rung 6). */
  if(!G.testScore&&HiScore.qualifies(score)){
    G.entry={active:true,name:['A','A','A'],pos:0,latch:true};
    G.state='entry';
  } else G.state='title';
}
function entryKey(k){
  const e=G.entry;if(!e)return;
  const idx=c=>Math.max(0,LETTERS.indexOf(c));
  if(k==='ArrowUp'||k==='w')e.name[e.pos]=LETTERS[(idx(e.name[e.pos])+1)%LETTERS.length];
  else if(k==='ArrowDown'||k==='s')e.name[e.pos]=LETTERS[(idx(e.name[e.pos])-1+LETTERS.length)%LETTERS.length];
  else if(k==='ArrowLeft'||k==='a')e.pos=(e.pos+2)%3;
  else if(k==='ArrowRight'||k==='d')e.pos=(e.pos+1)%3;
  else if(k==='Enter'){HiScore.add(e.name.join(''),G.score);G.entry=null;G.state='title';}
}
/* ====================== feedback (pilot contract, rungs 5-8) ============== */

/* ====================== input ============================================= */
const keys={up:false,down:false,left:false,right:false};
let stepAcc=0, testSeq='';
function keyDir(k){
  if(k==='ArrowUp'||k==='w'||k==='W')return'up';
  if(k==='ArrowDown'||k==='s'||k==='S')return'down';
  if(k==='ArrowLeft'||k==='a'||k==='A')return'left';
  if(k==='ArrowRight'||k==='d'||k==='D')return'right';
  return null;
}
addEventListener('keydown',e=>{
  ac();
  /* INV-15: the modal state defines its own bindings and never inherits
     gameplay ones. */
  if(G.state==='entry'){entryKey(e.key);e.preventDefault();return;}
  if(Feedback.isOpen)return;
  if(G.state==='title'){
    if(e.key==='*'||e.key==='#'){
      testSeq+=e.key;
      if(testSeq.length>3)testSeq=testSeq.slice(-3);
      if(testSeq==='*#*'){G.testMode=!G.testMode;testSeq='';}
      return;
    }
    testSeq='';
    if(e.key===' '||e.key==='Enter'){
      if(G.testMode){
        const lv=parseInt(prompt('Level 1-18?','1')||'1',10);
        const lv2=Math.max(1,Math.min(18,isNaN(lv)?1:lv));
        const li=parseInt(prompt('Lives 1-9?','4')||'4',10);
        const li2=Math.max(1,Math.min(9,isNaN(li)?4:li));
        newGame({level:lv2-1,lives:li2,test:true});
      } else newGame({});

    };
    const patient=run(true), rusher=run(false);
    const ratio=rusher===0?Infinity:patient/rusher;
    return{pass:patient>=2*Math.max(1,rusher),
      detail:'waiting bot '+patient+' vs rushing bot '+rusher+
        ' total score (ratio '+(ratio===Infinity?'inf':ratio.toFixed(2))+'x)'};
  },
  run(){
    const names=['spriteIntegrity','terrainRelief','muteEquivalence','cueVisualPairing',
      'pyramidSilhouette','mountainTable','elevationDerived',
      'containment','wrapAround','seedDeterminism','layoutVariety','allClimbable',
      'penaltyTable','knockDownArithmetic','cascadeTerminates','fallingSubstep',
      'fallSpeedCeiling','fallClassUnlocks','invertedTimer','scoreTable','summitBonus',
      'startingLives','extraClimberPerRound','testScoreExcluded','noLeakAcrossRestarts',
      'skillRatio','waitingPays'];
    const out=[];let pass=0;
    for(const n of names){
      let r;
      try{r=tests[n]();}catch(e){r={pass:false,detail:'THREW '+e.message};}
      if(r.pass)pass++;
      out.push((r.pass?'PASS':'FAIL')+'  '+n+'  —  '+r.detail);
    }
    G.state='title';
    return{passed:pass,total:names.length,
      lines:out,summary:pass+'/'+names.length+' PASS'};
  }
};
/* ====================== exposure ========================================= */
window.__alpiner={
  get state(){return G.state;},
  get score(){return G.score;},
  game:G, sim, HiScore, LETTERS, startEntryOrTitle, Feedback, tests,
  TI, MOUNTAINS, HAZ, CUES, Speech, newGame,
  climbable:()=>climbable(G.grid,G.rows),
  /* INV-6 applied to the RENDERER, not just the state. Verification harnesses
     run in panes where requestAnimationFrame never fires, so frame() never
     calls draw() and the canvas reads as 49,152 black pixels — indistinguishable
     from a game that draws nothing. A renderer with no programmatic handle can
     only be checked by a human looking at it, which is exactly the hole INV-6
     was written to close. Call this, then sample the canvas. */
  render(){draw();return{w:cv.width,h:cv.height};}
};
</script>
