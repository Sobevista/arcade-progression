<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>INVADERS — rung 2</title>

<style>
  :root { --ti-black:#000000; --ti-gray:#CCCCCC; }
  html,body {
    margin:0; height:100%; background:var(--ti-black); color:var(--ti-gray);
    font-family:ui-monospace,"Cascadia Mono",Consolas,monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; overflow:hidden; touch-action:none; user-select:none;
  }
  canvas { image-rendering:pixelated; display:block; }
  #pad, #pad2 { display:none; gap:10px; }
  #pad button {
    width:88px; height:56px; font:inherit; font-size:20px;
    background:#111; color:var(--ti-gray); border:2px solid #333; border-radius:8px;
  }
  #pad2 button {
    width:88px; height:34px; font:inherit; font-size:12px;
    background:#0a0a0a; color:#888; border:2px solid #262626; border-radius:8px;
  }
  #pad button:active, #pad2 button:active { background:#222; }
  body.touch #pad, body.touch #pad2 { display:flex; }
  #hint { font-size:12px; color:#555; letter-spacing:1px; }
  body.touch #hint { display:none; }
</style>

<canvas id="screen"></canvas>
<div id="pad">
  <button id="bL" aria-label="left">&#9664;</button>
  <button id="bF" aria-label="fire">FIRE</button>
  <button id="bR" aria-label="right">&#9654;</button>
</div>
<div id="pad2">
  <button id="bP" aria-label="pause">PAUSE</button>
  <button id="bT" aria-label="title">TITLE</button>
  <button id="bM" aria-label="sound">SOUND</button>
</div>
<div id="hint">&larr; &rarr; MOVE &nbsp;&middot;&nbsp; SPACE FIRE &nbsp;&middot;&nbsp; P PAUSE &nbsp;&middot;&nbsp; M SOUND &nbsp;&middot;&nbsp; ESC TITLE</div>

<script>
"use strict";
/* =========================================================================
   INVADERS — rung 2 of the progression (Pong '72 -> Invaders '78 -> ...)
   Single file, vanilla JS, Canvas 2D, zero dependencies, no build step.
   Palette: TMS9918A — the 15 colours of the TI-99/4A.
   ========================================================================= */

/* ---- TI-99/4A palette (TMS9918A) ------------------------------------- */
const TI = {
  black:'#000000', mediumGreen:'#21C842', lightGreen:'#5EDC78',
  darkBlue:'#5455ED', lightBlue:'#7D76FC', darkRed:'#D4524D',
  cyan:'#42EBF5',    mediumRed:'#FC5554',  lightRed:'#FF7978',
  darkYellow:'#D4C154', lightYellow:'#E6CE80', darkGreen:'#21B03B',
  magenta:'#C95BBA', gray:'#CCCCCC', white:'#FFFFFF'
};

/* ---- Sound: synthesised, zero assets ---------------------------------
   Every effect is generated by an oscillator or a noise buffer at runtime —
   no files to load, nothing to 404, still one self-contained HTML file.
   Browsers block audio until a user gesture, so the context is created lazily
   on first input (see unlock()).                                          */
const Sound = (() => {
  let ac = null, muted = false;
  const ctx = () => ac || (ac = new (window.AudioContext || window.webkitAudioContext)());

  function tone({ freq, to = null, dur = 0.1, type = 'square', vol = 0.12 }) {
    if (muted || !ac) return;
    const c = ac, t0 = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (to !== null) o.frequency.linearRampToValueAtTime(to, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(c.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise({ dur = 0.2, vol = 0.2, hp = 0 }) {
    if (muted || !ac) return;
    const c = ac, n = Math.max(1, Math.floor(c.sampleRate * dur));
    const buf = c.createBuffer(1, n, c.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);  // decaying
    const s = c.createBufferSource(); s.buffer = buf;
    const g = c.createGain(); g.gain.value = vol;
    let node = s;
    if (hp) { const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = hp;
              s.connect(f); node = f; }
    node.connect(g).connect(c.destination);
    s.start();
  }

  return {
    unlock() { const c = ctx(); if (c.state === 'suspended') c.resume(); },
    toggle() { muted = !muted; return muted; },
    get muted() { return muted; },
    shoot()   { tone({ freq: 880, to: 260, dur: 0.13, type: 'square',   vol: 0.07 }); },
    hit()     { noise({ dur: 0.16, vol: 0.16, hp: 700 }); },
    death()   { noise({ dur: 0.55, vol: 0.22 });
                tone({ freq: 320, to: 40, dur: 0.55, type: 'sawtooth', vol: 0.10 }); },
    ufoPing() { tone({ freq: 1300, to: 900, dur: 0.18, type: 'sine', vol: 0.05 }); },
    ufoDie()  { tone({ freq: 900, to: 120, dur: 0.35, type: 'square', vol: 0.09 });
                noise({ dur: 0.3, vol: 0.14 }); },
    wave()    { [523,659,784,1047].forEach((f,i) =>
                  setTimeout(() => tone({ freq:f, dur:0.12, type:'square', vol:0.09 }), i*90)); },
    // the four-note descending bass loop — the heartbeat of the genre
    march(step) { tone({ freq: [96, 88, 80, 72][step & 3], dur: 0.09,
                         type: 'square', vol: 0.13 }); }
  };
})();

/* ---- Logical screen. Real Space Invaders was 224x256. ----------------- */
const W = 224, H = 256;
const cv = document.getElementById('screen');
const cx = cv.getContext('2d', { alpha:false });

let scale = 1;
function fit() {
  // Integer scaling only — fractional scaling is what makes pixel art mushy.
  const availW = window.innerWidth  - 16;
  const availH = window.innerHeight - (document.body.classList.contains('touch') ? 130 : 60);
  scale = Math.max(1, Math.floor(Math.min(availW / W, availH / H)));
  cv.width = W; cv.height = H;
  cv.style.width  = (W * scale) + 'px';
  cv.style.height = (H * scale) + 'px';
  cx.imageSmoothingEnabled = false;
}
if (matchMedia('(hover: none)').matches) document.body.classList.add('touch');
addEventListener('resize', fit);
fit();

/* ---- Sprites. '1' = lit pixel. Authentic 1978 shapes. ----------------- */
function sprite(rows) {
  return { w: rows[0].length, h: rows.length,
           bits: rows.map(r => [...r].map(c => c === 'X' ? 1 : 0)) };
}

const SQUID = [sprite([
  '...XX...','..XXXX..','.XXXXXX.','XX.XX.XX',
  'XXXXXXXX','..X..X..','.X.XX.X.','X.X..X.X']),
  sprite([
  '...XX...','..XXXX..','.XXXXXX.','XX.XX.XX',
  'XXXXXXXX','.X.XX.X.','X......X','.X....X.'])];

const CRAB = [sprite([
  '..X.....X..','...X...X...','..XXXXXXX..','.XX.XXX.XX.',
  'XXXXXXXXXXX','X.XXXXXXX.X','X.X.....X.X','...XX.XX...']),
  sprite([
  '..X.....X..','X..X...X..X','X.XXXXXXX.X','XXX.XXX.XXX',
  'XXXXXXXXXXX','.XXXXXXXXX.','..X.....X..','.X.......X.'])];

const OCTO = [sprite([
  '....XXXX....','.XXXXXXXXXX.','XXXXXXXXXXXX','XXX..XX..XXX',
  'XXXXXXXXXXXX','...XX..XX...','..XX.XX.XX..','XX........XX']),
  sprite([
  '....XXXX....','.XXXXXXXXXX.','XXXXXXXXXXXX','XXX..XX..XXX',
  'XXXXXXXXXXXX','..XXX..XXX..','.XX..XX..XX.','..XX....XX..'])];

const SHIP = sprite([
  '......X......','.....XXX.....','.....XXX.....','.XXXXXXXXXXX.',
  'XXXXXXXXXXXXX','XXXXXXXXXXXXX','XXXXXXXXXXXXX','XXXXXXXXXXXXX']);

const UFO = sprite([
  '.....XXXXXX.....','...XXXXXXXXXX...','..XXXXXXXXXXXX..','.XX.XX.XX.XX.XX.',
  'XXXXXXXXXXXXXXXX','..XXX..XX..XXX..','...X........X...']);

const BOOM = sprite([
  '...X.....X...','X...X...X...X','.X...X.X...X.','..XX.XXX.XX..',
  '.XXXXXXXXXXX.','..XX.XXX.XX..','.X...X.X...X.','X...X...X...X']);

function draw(s, x, y, color) {
  cx.fillStyle = color;
  for (let r = 0; r < s.h; r++)
    for (let c = 0; c < s.w; c++)
      if (s.bits[r][c]) cx.fillRect((x|0) + c, (y|0) + r, 1, 1);
}

/* ---- 5x7 font, enough for score + messages --------------------------- */
const GLYPHS = {
 '0':'11111 10001 10001 10001 10001 10001 11111','1':'00100 01100 00100 00100 00100 00100 01110',
 '2':'11111 00001 00001 11111 10000 10000 11111','3':'11111 00001 00001 11111 00001 00001 11111',
 '4':'10001 10001 10001 11111 00001 00001 00001','5':'11111 10000 10000 11111 00001 00001 11111',
 '6':'11111 10000 10000 11111 10001 10001 11111','7':'11111 00001 00010 00100 01000 01000 01000',
 '8':'11111 10001 10001 11111 10001 10001 11111','9':'11111 10001 10001 11111 00001 00001 11111',
 'A':'01110 10001 10001 11111 10001 10001 10001','B':'11110 10001 10001 11110 10001 10001 11110',
 'C':'01111 10000 10000 10000 10000 10000 01111','D':'11110 10001 10001 10001 10001 10001 11110',
 'E':'11111 10000 10000 11110 10000 10000 11111','F':'11111 10000 10000 11110 10000 10000 10000',
 'G':'01111 10000 10000 10111 10001 10001 01111','H':'10001 10001 10001 11111 10001 10001 10001',
 'I':'11111 00100 00100 00100 00100 00100 11111','J':'00011 00001 00001 00001 00001 10001 01110',
 'K':'10001 10010 10100 11000 10100 10010 10001','L':'10000 10000 10000 10000 10000 10000 11111',
 'M':'10001 11011 10101 10101 10001 10001 10001','N':'10001 11001 10101 10011 10001 10001 10001',
 'O':'01110 10001 10001 10001 10001 10001 01110','P':'11110 10001 10001 11110 10000 10000 10000',
 'Q':'01110 10001 10001 10001 10101 10010 01101','R':'11110 10001 10001 11110 10100 10010 10001',
 'S':'01111 10000 10000 01110 00001 00001 11110','T':'11111 00100 00100 00100 00100 00100 00100',
 'U':'10001 10001 10001 10001 10001 10001 01110','V':'10001 10001 10001 10001 10001 01010 00100',
 'W':'10001 10001 10001 10101 10101 11011 10001','X':'10001 01010 00100 00100 00100 01010 10001',
 'Y':'10001 01010 00100 00100 00100 00100 00100','Z':'11111 00001 00010 00100 01000 10000 11111',
 ' ':'00000 00000 00000 00000 00000 00000 00000','-':'00000 00000 00000 11111 00000 00000 00000',
 '<':'00010 00100 01000 10000 01000 00100 00010','>':'01000 00100 00010 00001 00010 00100 01000',
 ':':'00000 00100 00100 00000 00100 00100 00000','!':'00100 00100 00100 00100 00100 00000 00100',
 '.':'00000 00000 00000 00000 00000 00000 00100','/':'00001 00010 00010 00100 01000 01000 10000'
};
function text(str, x, y, color) {
  cx.fillStyle = color;
  let px = x;
  for (const ch of str.toUpperCase()) {
    const g = GLYPHS[ch] || GLYPHS[' '];
    g.split(' ').forEach((row, r) => {
      for (let c = 0; c < 5; c++) if (row[c] === '1') cx.fillRect(px + c, y + r, 1, 1);
    });
    px += 6;
  }
}
const textW = s => s.length * 6 - 1;
const center = (s, y, color) => text(s, ((W - textW(s)) / 2) | 0, y, color);

/* ---- Input ------------------------------------------------------------ */
const keys = Object.create(null);
addEventListener('keydown', e => {
  if ([' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
  Sound.unlock();                                   // audio needs a user gesture
  if (e.key === 'p' || e.key === 'P') { if (game.state === 'play') game.paused = !game.paused; }
  if (e.key === 'm' || e.key === 'M') Sound.toggle();
  if (e.key === 'Escape') toTitle();                // in-game exit to title
});
addEventListener('keyup', e => { keys[e.key] = false; });

function toTitle() {
  if (game.state === 'title') return;
  game.paused = false;
  if (game.score > game.high) {                     // don't lose a high score on exit
    game.high = game.score;
    saveHigh(game.high);
  }
  game.state = 'title';
}

const touch = { left:false, right:false, fire:false };
function bindPad(id, prop) {
  const el = document.getElementById(id);
  const on  = e => { e.preventDefault(); Sound.unlock(); touch[prop] = true;  };
  const off = e => { e.preventDefault(); touch[prop] = false; };
  el.addEventListener('touchstart', on,  {passive:false});
  el.addEventListener('touchend',   off, {passive:false});
  el.addEventListener('touchcancel',off, {passive:false});
  el.addEventListener('mousedown',  on);
  el.addEventListener('mouseup',    off);
  el.addEventListener('mouseleave', off);
}
bindPad('bL','left'); bindPad('bR','right'); bindPad('bF','fire');

/* touch equivalents for the keyboard-only controls (pause/title/sound had none) */
function bindTap(id, fn) {
  const el = document.getElementById(id);
  const h = e => { e.preventDefault(); Sound.unlock(); fn(); };
  el.addEventListener('touchstart', h, {passive:false});
  el.addEventListener('click', h);
}
bindTap('bP', () => { if (game.state === 'play') game.paused = !game.paused; });
bindTap('bT', () => toTitle());
bindTap('bM', () => Sound.toggle());

const held = {
  left:  () => keys['ArrowLeft']  || keys['a'] || keys['A'] || touch.left,
  right: () => keys['ArrowRight'] || keys['d'] || keys['D'] || touch.right,
  fire:  () => keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'] || touch.fire
};

/* ---- Bunkers: real destructible terrain, stored as a pixel grid -------
   A boolean grid per bunker. Collision reads the grid; damage clears a
   blob. Repaint only when dirty — cheap, and a beginner can read it.    */
const BUNK_W = 22, BUNK_H = 16;
function makeBunker(x, y) {
  const grid = [];
  for (let r = 0; r < BUNK_H; r++) {
    const row = [];
    for (let c = 0; c < BUNK_W; c++) {
      let solid = true;
      const slope = 4 - r;                                  // rounded top corners
      if (r < 4 && (c < slope || c >= BUNK_W - slope)) solid = false;
      if (r >= 10 && Math.abs(c - 10.5) <= 1 + (r - 10) * 0.7) solid = false; // arch
      row.push(solid);
    }
    grid.push(row);
  }
  return { x, y, grid };
}
function bunkerHit(b, px, py) {
  const c = Math.floor(px - b.x), r = Math.floor(py - b.y);
  return r >= 0 && r < BUNK_H && c >= 0 && c < BUNK_W && b.grid[r][c];
}
function bunkerDamage(b, px, py, radius) {
  const c0 = Math.floor(px - b.x), r0 = Math.floor(py - b.y);
  for (let r = r0 - radius; r <= r0 + radius; r++)
    for (let c = c0 - radius; c <= c0 + radius; c++) {
      if (r < 0 || r >= BUNK_H || c < 0 || c >= BUNK_W) continue;
      // ragged edge, not a clean circle — erosion should look chewed
      if ((r-r0)*(r-r0) + (c-c0)*(c-c0) <= radius*radius + (Math.random()*2|0))
        b.grid[r][c] = false;
    }
}
function drawBunker(b) {
  cx.fillStyle = TI.mediumGreen;
  for (let r = 0; r < BUNK_H; r++)
    for (let c = 0; c < BUNK_W; c++)
      if (b.grid[r][c]) cx.fillRect(b.x + c, b.y + r, 1, 1);
}

/* ---- Game state ------------------------------------------------------ */
const ROWS = 5, COLS = 11, TOTAL = ROWS * COLS;

/* UFO cadence. Playtest 2026-07-18: "spaceships are too frequent, they should
   not be constant." Was 0.9-1.5s to first and 1.2-3.0s between — that made it
   ambient wallpaper instead of an event. The arcade original runs roughly one
   every 25 seconds; a mystery ship should feel like luck, not scenery.        */
const UFO_FIRST  = 18000;   // ms before the first one can appear
const UFO_GAP    = 20000;   // ms minimum between appearances
const UFO_JITTER = 11000;   // ms of randomness on top, so it's never countable
const PLAYER_Y   = H - 26;
const INVADE_LINE = PLAYER_Y - 4;   // they reach this, you lose

/* localStorage is not guaranteed when the file is opened directly from disk
   (file:// origins are treated inconsistently across browsers, and some block
   storage outright). Wrapped so the worst case is "high score doesn't persist"
   rather than "the game refuses to start."                                   */
function loadHigh()  { try { return +(localStorage.getItem('invaders.high') || 0); }
                       catch (e) { return 0; } }
function saveHigh(v) { try { localStorage.setItem('invaders.high', String(v)); }
                       catch (e) { /* running from disk without storage — fine */ } }

const game = {
  state: 'title',      // title | play | dying | over
  paused: false,
  score: 0,
  high: loadHigh(),
  lives: 3,
  wave: 1,
  ship: null, bullet: null, bombs: [], invaders: [], bunkers: [],
  ufo: null, ufoTimer: 0,
  dir: 1, stepTimer: 0, frame: 0, dropQueued: false,
  boom: [], dyingTimer: 0, flash: 0, marchTick: 0
};

/* Each new wave starts the formation LOWER — that descending start line is the
   real late-game difficulty curve in the 1978 original, not just raw speed.
   Verified 2026-07-18 against arcade references; was missing entirely before. */
function waveStartY(wave) { return 40 + Math.min(wave - 1, 6) * 6; }

function makeInvaders(startY) {
  const list = [];
  for (let r = 0; r < ROWS; r++) {
    // row 0 = squid, rows 1-2 = crab, rows 3-4 = octopus (classic layout)
    const kind = r === 0 ? 0 : r <= 2 ? 1 : 2;
    const spr  = [SQUID, CRAB, OCTO][kind][0];
    const pts  = [30, 20, 10][kind];
    const col  = [TI.cyan, TI.lightGreen, TI.magenta][kind];
    for (let c = 0; c < COLS; c++) {
      list.push({
        kind, pts, col, alive:true,
        // 16px column pitch, sprite centred in its cell
        x: 24 + c * 16 + ((12 - spr.w) / 2 | 0),
        y: startY + r * 14,
        cell: c
      });
    }
  }
  return list;
}

/* TWO DIFFERENT EVENTS, TWO DIFFERENT FUNCTIONS — deliberately not one function
   with a flag. A single reset(flag) is what caused the 2026-07-18 bug where dying
   handed you a brand new rack of 55 invaders: the respawn path had quietly
   inherited new-wave semantics because it reused the same function. See INV-11. */

/* A fresh rack. New game, or the previous wave was cleared.
   Shields ARE restored between waves (verified against the 1978 original). */
function resetWave() {
  game.invaders  = makeInvaders(waveStartY(game.wave));
  game.bunkers   = [0,1,2,3].map(i => makeBunker(22 + i * 46, PLAYER_Y - 34));
  game.dir       = 1;
  game.stepTimer = 0;
  game.frame     = 0;
  game.dropQueued= false;
  game.ufo       = null;
  game.ufoTimer  = UFO_FIRST + Math.random() * UFO_JITTER;
  clearShot();
}

/* You died but have lives left. ONLY the ship comes back.
   The invaders keep their positions AND stay dead where you killed them; the
   shields keep their damage. The rack does not restart — that's the whole
   tension of the game. */
function respawn() {
  clearShot();
}

function clearShot() {
  game.bullet = null;
  game.bombs.length = 0;
  game.boom.length  = 0;
  game.ship = { x: (W - SHIP.w) / 2 | 0, y: PLAYER_Y };
}

function newGame() {
  game.score = 0;
  game.lives = 3;
  game.wave  = 1;
  game.paused = false;
  resetWave();
  game.state = 'play';
}

/* ---- Invader march ---------------------------------------------------
   The tempo ramp: 55 alive is a slow lurch, the last one is frantic.
   A hardware accident in 1978 that became the soul of the genre.      */
function stepInterval() {
  const alive = game.invaders.filter(i => i.alive).length;
  const t = (alive - 1) / (TOTAL - 1);              // 1 -> full, 0 -> last one
  const base = 40 + t * 520;
  return Math.max(24, base * Math.pow(0.88, game.wave - 1));
}

function marchStep() {
  const alive = game.invaders.filter(i => i.alive);
  if (!alive.length) return;

  if (game.dropQueued) {
    alive.forEach(i => { i.y += 8; });
    game.dir = -game.dir;
    game.dropQueued = false;
  } else {
    const dx = 2 * game.dir;
    alive.forEach(i => { i.x += dx; });
    const minX = Math.min(...alive.map(i => i.x));
    const maxX = Math.max(...alive.map(i => i.x + [SQUID,CRAB,OCTO][i.kind][0].w));
    if (maxX >= W - 8 || minX <= 8) game.dropQueued = true;
  }
  game.frame ^= 1;                                   // sprite animation frame
  Sound.march(game.marchTick);                       // four-note descending bass
  game.marchTick++;

  // lose when they reach the line
  if (alive.some(i => i.y + 8 >= INVADE_LINE)) loseLife(true);
}

function invaderDrop() {
  // only the lowest invader in a column may drop a bomb
  const alive = game.invaders.filter(i => i.alive);
  if (!alive.length || game.bombs.length >= 2 + Math.min(2, game.wave - 1)) return;
  const byCol = new Map();
  alive.forEach(i => {
    const cur = byCol.get(i.cell);
    if (!cur || i.y > cur.y) byCol.set(i.cell, i);
  });
  const shooters = [...byCol.values()];
  const s = shooters[Math.random() * shooters.length | 0];
  const spr = [SQUID,CRAB,OCTO][s.kind][0];
  game.bombs.push({ x: s.x + (spr.w/2|0), y: s.y + 8, t: 0 });
}

function loseLife(overrun) {
  if (game.state !== 'play') return;
  game.lives--;
  game.state = 'dying';
  game.dyingTimer = 900;
  game.overrun = !!overrun;
  game.boom.push({ x: game.ship.x, y: game.ship.y, t: 900, col: TI.mediumRed });
  Sound.death();
}

function gameOver() {
  game.state = 'over';
  if (game.score > game.high) {
    game.high = game.score;
    saveHigh(game.high);
  }
}

/* ---- Collision, substepped -------------------------------------------
   A projectile must never travel further than SUB_PX between overlap tests.
   Found 2026-07-18 by test sweep: dt is clamped to 50ms, so at 0.30px/ms a
   bullet strides 15px per frame while an invader sprite is only 8px tall.
   7 of 21 starting offsets passed clean through with no hit registered.
   Point collision is a lie the moment speed exceeds target size.          */
const SUB_PX = 3;

function bulletConsumed(b) {
  if (b.y < 18) return true;                                        // off top
  for (const bk of game.bunkers)
    if (bunkerHit(bk, b.x, b.y)) { bunkerDamage(bk, b.x, b.y, 2); return true; }
  if (game.ufo) {
    const u = game.ufo;
    if (b.x >= u.x && b.x < u.x + UFO.w && b.y >= u.y && b.y < u.y + UFO.h) {
      game.score += u.pts;
      game.boom.push({ x:u.x + 2, y:u.y, t:260, col:TI.lightRed, label:String(u.pts) });
      game.ufo = null; Sound.ufoDie(); return true;
    }
  }
  for (const inv of game.invaders) {
    if (!inv.alive) continue;
    const spr = [SQUID,CRAB,OCTO][inv.kind][0];
    if (b.x >= inv.x && b.x < inv.x + spr.w && b.y >= inv.y && b.y < inv.y + spr.h) {
      inv.alive = false;
      game.score += inv.pts;
      game.boom.push({ x: inv.x - 1, y: inv.y, t: 180, col: TI.lightYellow });
      Sound.hit();
      return true;                                                  // exactly one
    }
  }
  return false;
}

/* ---- Update ----------------------------------------------------------- */
let firePrev = false;

function update(dt) {
  // ---- explosions tick in every state so they can finish drawing
  for (let i = game.boom.length - 1; i >= 0; i--) {
    game.boom[i].t -= dt;
    if (game.boom[i].t <= 0) game.boom.splice(i, 1);
  }
  if (game.flash > 0) game.flash -= dt;

  if (game.state === 'title') {
    if (held.fire() && !firePrev) newGame();
    firePrev = held.fire();
    return;
  }
  if (game.state === 'over') {
    if (held.fire() && !firePrev) game.state = 'title';
    firePrev = held.fire();
    return;
  }
  if (game.state === 'dying') {
    game.dyingTimer -= dt;
    if (game.dyingTimer <= 0) {
      if (game.lives <= 0 || game.overrun) gameOver();
      else { respawn(); game.state = 'play'; }   // ship only — the rack survives
    }
    return;
  }
  if (game.paused) { firePrev = held.fire(); return; }

  // ---- ship
  const speed = 0.09;
  if (held.left())  game.ship.x -= speed * dt;
  if (held.right()) game.ship.x += speed * dt;
  game.ship.x = Math.max(6, Math.min(W - 6 - SHIP.w, game.ship.x));

  // ---- fire (classic: exactly one player bullet on screen)
  const f = held.fire();
  if (f && !firePrev && !game.bullet) {
    game.bullet = { x: game.ship.x + (SHIP.w/2|0), y: game.ship.y - 2 };
    Sound.shoot();
  }
  firePrev = f;

  // ---- player bullet (substepped — see SUB_PX note above)
  if (game.bullet) {
    const dy = 0.30 * dt;
    const steps = Math.max(1, Math.ceil(dy / SUB_PX));
    for (let s = 0; s < steps && game.bullet; s++) {
      game.bullet.y -= dy / steps;
      if (bulletConsumed(game.bullet)) game.bullet = null;
    }
  }

  // ---- invader march
  game.stepTimer -= dt;
  if (game.stepTimer <= 0) { marchStep(); game.stepTimer = stepInterval(); }

  // ---- invader bombs
  if (Math.random() < dt / 900) invaderDrop();
  for (let i = game.bombs.length - 1; i >= 0; i--) {
    const bm = game.bombs[i];
    bm.t += dt;
    const dy = 0.12 * dt;
    const steps = Math.max(1, Math.ceil(dy / SUB_PX));   // substepped, same reason
    let gone = false, hitShip = false;

    for (let s = 0; s < steps && !gone; s++) {
      bm.y += dy / steps;
      if (bm.y > H - 8) { gone = true; break; }
      for (const bk of game.bunkers)
        if (bunkerHit(bk, bm.x, bm.y)) { bunkerDamage(bk, bm.x, bm.y, 2); gone = true; break; }
      if (!gone && bm.x >= game.ship.x && bm.x < game.ship.x + SHIP.w &&
          bm.y >= game.ship.y && bm.y < game.ship.y + SHIP.h) { gone = true; hitShip = true; }
    }
    if (gone) {
      game.bombs.splice(i, 1);
      if (hitShip) { loseLife(false); return; }
    }
  }

  // ---- UFO
  game.ufoTimer -= dt;
  if (!game.ufo && game.ufoTimer <= 0) {
    const fromLeft = Math.random() < 0.5;
    game.ufo = { x: fromLeft ? -UFO.w : W, vx: fromLeft ? 0.05 : -0.05,
                 y: 26, pts: [50,100,150,300][Math.random()*4|0], warble: 0 };
    game.ufoTimer = UFO_GAP + Math.random() * UFO_JITTER;
    Sound.ufoPing();
  }
  if (game.ufo) {
    game.ufo.x += game.ufo.vx * dt;
    game.ufo.warble -= dt;
    if (game.ufo.warble <= 0) { Sound.ufoPing(); game.ufo.warble = 220; }
    if (game.ufo.x < -UFO.w - 2 || game.ufo.x > W + 2) game.ufo = null;
  }

  // ---- wave cleared: fresh rack, shields REPAIRED (1978 behaviour), start lower
  if (game.invaders.every(i => !i.alive)) {
    game.wave++;
    game.flash = 400;
    Sound.wave();
    resetWave();
  }
}

/* ---- Render ----------------------------------------------------------- */
function render() {
  cx.fillStyle = TI.black;
  cx.fillRect(0, 0, W, H);

  // HUD
  text('SCORE', 6, 4, TI.gray);
  text(String(game.score).padStart(5,'0'), 6, 12, TI.white);
  const hs = 'HI ' + String(game.high).padStart(5,'0');
  text(hs, W - textW(hs) - 6, 4, TI.gray);
  const wv = 'WAVE ' + game.wave;
  text(wv, W - textW(wv) - 6, 12, TI.darkYellow);
  if (Sound.muted) center('SOUND OFF', 4, '#555');

  if (game.state === 'title') {
    center('INVADERS', 96, TI.mediumGreen);
    center('TI-99/4A PALETTE', 112, '#444');
    if (game.score > 0) center('LAST SCORE ' + game.score, 130, '#555');
    center(matchMedia('(hover: none)').matches ? 'TAP FIRE TO START' : 'PRESS SPACE TO START',
           148, ((performance.now()/500|0) % 2) ? TI.lightYellow : TI.darkYellow);
    draw(SQUID[(performance.now()/400|0)%2], 60,  180, TI.cyan);
    draw(CRAB [(performance.now()/400|0)%2], 100, 180, TI.lightGreen);
    draw(OCTO [(performance.now()/400|0)%2], 145, 180, TI.magenta);
    return;
  }

  // playfield floor
  cx.fillStyle = game.flash > 0 ? TI.white : TI.mediumGreen;
  cx.fillRect(0, H - 12, W, 1);

  game.bunkers.forEach(drawBunker);

  // invaders
  for (const inv of game.invaders) {
    if (!inv.alive) continue;
    draw([SQUID,CRAB,OCTO][inv.kind][game.frame], inv.x, inv.y, inv.col);
  }

  if (game.ufo) draw(UFO, game.ufo.x, game.ufo.y, TI.mediumRed);

  // ship (hidden while dying — the explosion stands in for it)
  if (game.state !== 'dying') draw(SHIP, game.ship.x, game.ship.y, TI.lightGreen);

  // bullet + bombs
  if (game.bullet) { cx.fillStyle = TI.white; cx.fillRect(game.bullet.x|0, game.bullet.y|0, 1, 4); }
  cx.fillStyle = TI.lightRed;
  for (const bm of game.bombs) {
    const wig = ((bm.t/80|0) % 2) ? 1 : 0;                 // classic wiggling bomb
    cx.fillRect((bm.x|0) + wig, bm.y|0, 1, 3);
  }

  // explosions
  for (const e of game.boom) {
    if (e.label) text(e.label, e.x, e.y, e.col);
    else draw(BOOM, e.x, e.y, e.col);
  }

  // lives
  for (let i = 0; i < game.lives; i++) draw(SHIP, 8 + i * 16, H - 9, TI.lightGreen);

  if (game.paused)         center('PAUSED', 120, TI.lightYellow);
  if (game.state === 'over') {
    center('GAME OVER', 112, TI.mediumRed);
    if (game.score >= game.high && game.score > 0) center('NEW HIGH SCORE', 126, TI.lightYellow);
    center('FIRE TO CONTINUE', 142, TI.gray);
  }
}

/* ---- Loop ------------------------------------------------------------- */
let last = performance.now();
function frame(now) {
  // clamp dt so a backgrounded tab doesn't teleport everything on return
  const dt = Math.min(50, now - last);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---- Test hook: lets an outside witness check PASS criteria ----------- */
window.__invaders = {
  get state()   { return game.state; },
  get score()   { return game.score; },
  get alive()   { return game.invaders.filter(i => i.alive).length; },
  get entities(){ return game.invaders.length + game.bombs.length +
                         game.boom.length + (game.bullet?1:0) + (game.ufo?1:0); },
  game, newGame, resetWave, respawn, toTitle, Sound, waveStartY
};
</script>
