<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>BREAKOUT — rung 3</title>

<style>
  /* html must NOT be a flex container. When it was, <body> became a centered
     flex ITEM and shrank to its content — 448px wide on a 921px screen — so
     any "full width" control row silently wasn't. Found 2026-07-18 while
     widening the touch controls. */
  html { margin:0; height:100%; }
  body {
    margin:0; min-height:100%; width:100%; box-sizing:border-box;
    background:#000; color:#CCCCCC;
    font-family:ui-monospace,"Cascadia Mono",Consolas,monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; overflow:hidden; touch-action:none; user-select:none;
  }
  canvas { image-rendering:pixelated; display:block; }
  #pad, #pad2 { display:none; }

  /* Playtest 2026-07-18, Lucius (9): "this is for kids not adults and our hands
     aren't that big" — the movement arrows need to sit at the OUTER EDGES so a
     thumb on each side of a tablet can reach them without regripping. Full-width
     row, space-between, one control per thumb. */
  /* No max-width: the arrows must reach the physical edges of a tablet, not sit
     inside a centred column. A cap of 760px left them 89px inboard on a 921px
     screen and would have been 220px inboard on a 1200px tablet — exactly the
     reach problem Lucius reported. */
  #pad { width:100%; justify-content:space-between;
         padding:0 10px; box-sizing:border-box; gap:8px; }
  #pad button { flex:1 1 0; max-width:190px; height:76px;
    font:inherit; font-size:24px;
    background:#111; color:#CCC; border:2px solid #333; border-radius:12px; }

  /* Same playtest: PAUSE/TITLE/SOUND sat right next to the arrows and got hit
     by accident. Moved ABOVE the canvas — thumbs live at the bottom of a
     tablet, so the top edge is the safe place for controls you rarely want. */
  #pad2 { gap:8px; margin-bottom:4px; }
  #pad2 button { width:78px; height:30px; font:inherit; font-size:11px;
    background:#0a0a0a; color:#777; border:2px solid #242424; border-radius:8px; }

  #pad button:active, #pad2 button:active { background:#222; }
  body.touch #pad, body.touch #pad2 { display:flex; }
  #hint { font-size:12px; color:#555; letter-spacing:1px; }
  body.touch #hint { display:none; }
</style>

<div id="pad2">
  <button id="bP">PAUSE</button>
  <button id="bT">TITLE</button>
  <button id="bM">SOUND</button>
</div>
<canvas id="screen"></canvas>
<div id="pad">
  <button id="bL" aria-label="left">&#9664;</button>
  <button id="bF" aria-label="launch">FIRE</button>
  <button id="bR" aria-label="right">&#9654;</button>
</div>
<div id="hint">&larr; &rarr; MOVE &nbsp;&middot;&nbsp; SPACE LAUNCH &nbsp;&middot;&nbsp; P PAUSE &nbsp;&middot;&nbsp; M SOUND &nbsp;&middot;&nbsp; ESC TITLE</div>

<script>
"use strict";
/* =========================================================================
   BREAKOUT — rung 3 (Atari, May 1976)
   Single file, vanilla JS, Canvas 2D, zero dependencies, no build step.

   The original had NO CPU — pure discrete TTL logic, ~100 chips in production.
   Every rule below was a circuit, which is why there are so few of them.
   Self-imposed constraint for this rung: no mechanic that wasn't in the 1976
   game. Our marginal cost for a new rule is zero, which is exactly why it has
   to be a written rule. See ARCHAEOLOGY.md (A-5).
   ========================================================================= */

/* ---- TI-99/4A palette (TMS9918A) -------------------------------------
   Series constraint, held across every rung. It has NO true orange, so the
   1976 orange band is approximated. Recorded as an accepted cost, not hidden. */
const TI = {
  black:'#000000', mediumGreen:'#21C842', lightGreen:'#5EDC78',
  darkBlue:'#5455ED', lightBlue:'#7D76FC', darkRed:'#D4524D',
  cyan:'#42EBF5',    mediumRed:'#FC5554',  lightRed:'#FF7978',
  darkYellow:'#D4C154', lightYellow:'#E6CE80', darkGreen:'#21B03B',
  magenta:'#C95BBA', gray:'#CCCCCC', white:'#FFFFFF'
};

const W = 224, H = 256;
const cv = document.getElementById('screen');
const cx = cv.getContext('2d', { alpha:false });

let scale = 1;
function fit() {
  const availW = window.innerWidth  - 16;
  // taller allowance on touch: control row above (34) + below (80) + gaps
  const availH = window.innerHeight - (document.body.classList.contains('touch') ? 150 : 60);
  scale = Math.max(1, Math.floor(Math.min(availW / W, availH / H)));
  cv.width = W; cv.height = H;
  cv.style.width = (W*scale)+'px'; cv.style.height = (H*scale)+'px';
  cx.imageSmoothingEnabled = false;
}
if (matchMedia('(hover: none)').matches) document.body.classList.add('touch');
addEventListener('resize', fit);
fit();

/* ---- Sound: synthesised, zero assets ---------------------------------- */
const Sound = (() => {
  let ac = null, muted = false;
  const ctx = () => ac || (ac = new (window.AudioContext || window.webkitAudioContext)());
  function tone({ freq, to=null, dur=0.08, type='square', vol=0.10 }) {
    if (muted || !ac) return;
    const c = ac, t0 = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    if (to !== null) o.frequency.linearRampToValueAtTime(to, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(c.destination); o.start(t0); o.stop(t0 + dur + 0.02);
  }
  return {
    unlock() { const c = ctx(); if (c.state === 'suspended') c.resume(); },
    toggle() { muted = !muted; return muted; },
    get muted() { return muted; },
    wall()   { tone({ freq: 220, dur: 0.05 }); },
    paddle() { tone({ freq: 330, dur: 0.06 }); },
    // higher rows ping higher — the value gradient made audible
    brick(row) { tone({ freq: 440 + (7 - row) * 70, dur: 0.06 }); },
    lose()   { tone({ freq: 300, to: 60, dur: 0.4, type:'sawtooth', vol: 0.11 }); },
    speed()  { tone({ freq: 880, to: 1200, dur: 0.12, vol: 0.07 }); },
    clear()  { [523,659,784,1047].forEach((f,i) =>
                 setTimeout(() => tone({ freq:f, dur:0.12, vol:0.09 }), i*90)); }
  };
})();

/* ---- 5x7 font --------------------------------------------------------- */
const GLYPHS = {
 '0':'11111 10001 10001 10001 10001 10001 11111','1':'00100 01100 00100 00100 00100 00100 01110',
 '2':'11111 00001 00001 11111 10000 10000 11111','3':'11111 00001 00001 11111 00001 00001 11111',
 '4':'10001 10001 10001 11111 00001 00001 00001','5':'11111 10000 10000 11111 00001 00001 11111',
 '6':'11111 10000 10000 11111 10001 10001 11111','7':'11111 00001 00010 00100 01000 01000 01000',
 '8':'11111 10001 10001 11111 10001 10001 11111','9':'11111 10001 10001 11111 00001 00001 11111',
 'A':'01110 10001 10001 11111 10001 10001 10001','B':'11110 10001 10001 11110 10001 10001 11110',
 'C':'01111 10000 10000 10000 10000 10000 01111','D':'11110 10001 10001 10001 10001 10001 11110',
 'E':'11111 10000 10000 11110 10000 10000 11111','F':'11111 10000 10000 11110 10000 10000 10000',
 'G':'01111 10000 10000 10111 10001 10001 01111','H':'10001 10001 10001 11111 10001 10001 10001',
 'I':'11111 00100 00100 00100 00100 00100 11111','J':'00011 00001 00001 00001 00001 10001 01110',
 'K':'10001 10010 10100 11000 10100 10010 10001','L':'10000 10000 10000 10000 10000 10000 11111',
 'M':'10001 11011 10101 10101 10001 10001 10001','N':'10001 11001 10101 10011 10001 10001 10001',
 'O':'01110 10001 10001 10001 10001 10001 01110','P':'11110 10001 10001 11110 10000 10000 10000',
 'Q':'01110 10001 10001 10001 10101 10010 01101','R':'11110 10001 10001 11110 10100 10010 10001',
 'S':'01111 10000 10000 01110 00001 00001 11110','T':'11111 00100 00100 00100 00100 00100 00100',
 'U':'10001 10001 10001 10001 10001 10001 01110','V':'10001 10001 10001 10001 10001 01010 00100',
 'W':'10001 10001 10001 10101 10101 11011 10001','X':'10001 01010 00100 00100 00100 01010 10001',
 'Y':'10001 01010 00100 00100 00100 00100 00100','Z':'11111 00001 00010 00100 01000 10000 11111',
 ' ':'00000 00000 00000 00000 00000 00000 00000','-':'00000 00000 00000 11111 00000 00000 00000',
 ':':'00000 00100 00100 00000 00100 00100 00000','.':'00000 00000 00000 00000 00000 00000 00100',
 '/':'00001 00010 00010 00100 01000 01000 10000','!':'00100 00100 00100 00100 00100 00000 00100'
};
function text(str, x, y, color) {
  cx.fillStyle = color; let px = x;
  for (const ch of str.toUpperCase()) {
    const g = GLYPHS[ch] || GLYPHS[' '];
    g.split(' ').forEach((row, r) => {
      for (let c = 0; c < 5; c++) if (row[c] === '1') cx.fillRect(px+c, y+r, 1, 1);
    });
    px += 6;
  }
}
const textW = s => s.length * 6 - 1;
const center = (s, y, color) => text(s, ((W - textW(s))/2)|0, y, color);

/* ---- Playfield geometry ----------------------------------------------
   14 bricks across a 210px play area = exactly 15px each. Integer maths only;
   fractional brick widths are how pixel art turns to mush.                */
const WALL      = 7;                 // left/right wall thickness
const PLAY_L    = WALL, PLAY_R = W - WALL;
const CEIL      = 20;                // top wall (below the HUD)
const COLS      = 14, ROWS = 8;
const BRICK_W   = 15, BRICK_H = 6;
const BRICK_TOP = 56;
const PADDLE_Y  = H - 22;
const PADDLE_FULL = 24, PADDLE_H = 3;
const BALL      = 3;

/* Row colours and values, top row first. Two rows per colour (1976).
   The TI palette has no true orange. First attempt used lightRed, which read as
   salmon and sat too close to the red band above it — and the 1/3/5/7 scoring is
   meant to be a VISIBLE risk gradient, so that was costing the player real
   information. Daniel's call 2026-07-18: legibility wins, this is a UX problem
   not a fidelity requirement. darkYellow (gold) is clearly distinct from the red
   above it, and green sits between it and the pale yellow below, so no two
   adjacent bands are confusable. See UX_DECISIONS UX-17.

   REVISED AGAIN 2026-07-18 after playtest 2: gold still interfered with the red
   band in motion ("makes lines 1 and 3 do funky things to me while playing").
   Measured separation was fine at rest (115) but reading colour while tracking
   a moving ball is a harder task than comparing two swatches. Moved to darkBlue
   — a different hue family entirely. Adjacent separations are now 227 / 211 /
   207, all near-maximal. This is a real fidelity cost (the 1976 band was orange)
   taken deliberately for legibility. A-10. */
/* `name` is the HISTORICAL band identity and drives the 1976 trigger logic.
   `label` is what the player is told, and must match what they can SEE.
   Playtest 2026-07-18: after recolouring the orange band blue, the speed-up
   message still announced "ORANGE ROW" while the player was looking at a blue
   row. Same one-fact-two-homes failure as the title screen earlier — the fix is
   to make the display string a separate field, not a reused identity. */
const ROW_DEF = [
  { col: TI.mediumRed,   pts: 7, name:'red',    label:'RED ROW'  },
  { col: TI.mediumRed,   pts: 7, name:'red',    label:'RED ROW'  },
  { col: TI.darkBlue,    pts: 5, name:'orange', label:'BLUE ROW' },
  { col: TI.darkBlue,    pts: 5, name:'orange', label:'BLUE ROW' },
  { col: TI.mediumGreen, pts: 3, name:'green',  label:'GREEN ROW'},
  { col: TI.mediumGreen, pts: 3, name:'green',  label:'GREEN ROW'},
  { col: TI.lightYellow, pts: 1, name:'yellow', label:'YELLOW ROW'},
  { col: TI.lightYellow, pts: 1, name:'yellow', label:'YELLOW ROW'}
];

/* ---- Speed table (1976 authored curve) -------------------------------
   Speeds up after 4 hits, after 12 hits, and on first touching the orange
   and red rows. Four discrete steps, deliberately designed — two years
   BEFORE Space Invaders got its famous curve by accident. ARCHAEOLOGY A-8.

   Units are px/ms. The px/frame figures below assume 60 Hz.

   [ASSUMED] — there is NO authoritative source for the original's ball speed,
   and the reason is structural: Breakout has no processor, so there is no ROM,
   so it is absent from MAME and must be *simulated* rather than emulated. The
   exact timing lives in discrete circuit behaviour nobody can read out of a
   binary. Anyone quoting you a pixels-per-frame figure is reconstructing it.

   Revised 2026-07-18 (playtest 1): opened at 1.92 px/frame, top of the era
   range. Floor lowered to 1.42.

   Revised again 2026-07-18 (playtest 2). Daniel: "the initial speed is good,
   the progressive increase is gapped too wide... it is like lightning on level
   1 when I get to the last row" — and he could not clear wall 1 without dying.
   The floor was right; the ~25%-per-step jumps were not. Narrowed to ~12.5%:
     step 0  0.085  ->  1.42 px/frame   (unchanged - he confirmed this one)
     step 1  0.096  ->  1.60            (was 1.83)
     step 2  0.108  ->  1.80            (was 2.33)
     step 3  0.121  ->  2.02            (was 2.92)
     step 4  0.137  ->  2.28            (was 3.58)
   Top/start ratio 1.61x, down from 2.53x. The curve is still felt - four
   distinct steps - but the top is now catchable rather than a wall.         */
const SPEED = [0.085, 0.096, 0.108, 0.121, 0.137];

/* The 1976 original ships exactly TWO walls, worth 448 points each — max score
   896, after which the ball bounces harmlessly off empty walls forever. There is
   no wall 3. Ours previously generated walls endlessly, which meant the game had
   no win state at all. Restored: two walls, then you've beaten it.
   Our layout produces exactly 448/wall: 14 cols x 2 rows x (7+5+3+1) = 448. */
const MAX_WALLS = 2;
const PERFECT   = 896;

const game = {
  state: 'title',            // title | serve | play | dying | over | cleared | won | entry
  entry: null,               // { chars:[i,i,i], slot, hold, lastRank }
  paused: false,
  score: 0, balls: 3, level: 1,
  bricks: [], paddleW: PADDLE_FULL, paddleX: 0,
  ball: null, hits: 0, speedStep: 0,
  hitOrange: false, hitRed: false, brokeThrough: false,
  msgTimer: 0, msg: '', flash: 0
};

/* The HI display is DERIVED from the high score table, never stored separately.
   The old standalone `breakout.high` key was a second home for the same fact and
   promptly drifted — the HUD showed HI 0037 while the table's top row said 0319.
   One fact, one home. The legacy key is actively deleted on load so an old save
   can't resurrect the drift. */
function topScore() { const l = HiScore.list(); return l.length ? l[0].s : 0; }
try { localStorage.removeItem('breakout.high'); } catch (e) {}   // kill the old home

/* ---- HIGH SCORE TABLE ------------------------------------------------
   PROTOCOL (shared across every rung — canonical copy in tools/hiscore.js):
     storage key   arcade.<game>.scores
     value         JSON array, sorted desc, capped at MAX
     entry shape   { n: "ABC", s: 319, d: "2026-07-18" }

   Inlined rather than imported because the single-file rule is about
   DISTRIBUTION — one file you can double-click, email, or drop on a site.
   A shared script would break that. Cost: this block is duplicated per rung
   and must be kept in sync with tools/hiscore.js. Deliberate trade.

   ANACHRONISM, DECLARED: initials-entry high score tables did not exist in
   1976. Star Fire (Exidy, 1979) was first; Asteroids copied it the same year.
   Three letters specifically because manufacturers wanted to limit obscenities
   in the attract mode. So this is a 1979 invention imported backwards into a
   1976 game, on purpose — the competitive loop is the reason kids come back,
   and that matters more here than the date. Recorded in the Suffering Ledger. */
const HiScore = (() => {
  const KEY = 'arcade.breakout.scores', MAX = 8;
  const load = () => { try { return JSON.parse(localStorage.getItem(KEY)) || []; }
                       catch (e) { return []; } };
  const store = l => { try { localStorage.setItem(KEY, JSON.stringify(l)); } catch (e) {} };
  return {
    list: load,
    qualifies(score) {
      if (score <= 0) return false;
      const l = load();
      return l.length < MAX || score > l[l.length - 1].s;
    },
    add(name, score) {
      const l = load();
      l.push({ n: name, s: score, d: new Date().toISOString().slice(0, 10) });
      l.sort((a, b) => b.s - a.s);
      const cut = l.slice(0, MAX);
      store(cut);
      return cut.findIndex(e => e.s === score && e.n === name) + 1;
    },
    clear() { try { localStorage.removeItem(KEY); } catch (e) {} }
  };
})();

/* No space in the set: SPACE is the confirm button, and a character that is
   also a control is a character you can never actually enter. */
const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ.';

/* ---- INV-11: one function per lifecycle event, no boolean flags ------- */
function makeBricks() {
  const out = [];
  const left = PLAY_L + ((PLAY_R - PLAY_L) - COLS * BRICK_W) / 2;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      out.push({ x: left + c*BRICK_W, y: BRICK_TOP + r*BRICK_H, row: r, alive: true });
  return out;
}
function newGame() {                       // brand new game
  game.score = 0; game.balls = 3; game.level = 1;
  game.paused = false;
  newLevel();
  game.state = 'serve';
}
function newLevel() {                      // fresh wall, curve resets (1976)
  game.bricks = makeBricks();
  game.paddleW = PADDLE_FULL;
  game.hits = 0; game.speedStep = 0;
  game.hitOrange = false; game.hitRed = false; game.brokeThrough = false;
  newBall();
}
function newBall() {                       // lost a ball, wall persists
  /* The speed curve RESETS on a new ball. [ASSUMED — no source either way; see
     ARCHAEOLOGY A-9, there is no ROM to read this out of.] Chosen deliberately
     on playability grounds: without it, losing a ball at top speed hands you
     the remaining balls already at maximum difficulty, which is a death spiral
     — the game gets harder exactly when you are least equipped, and there is no
     path back. Daniel could not clear wall 1. The row flags reset too, so the
     orange/red triggers can fire again and the curve genuinely replays.
     What does NOT reset: the halved paddle. That one IS documented as a
     punishment for breaking through, and it persists for the rest of the wall. */
  game.hits = 0;
  game.speedStep = 0;
  game.hitOrange = false;
  game.hitRed = false;
  game.paddleX = (W - game.paddleW) / 2;
  game.ball = null;
  game.state = 'serve';
}
function launch() {
  const dir = Math.random() < 0.5 ? -1 : 1;
  game.ball = { x: game.paddleX + game.paddleW/2, y: PADDLE_Y - 6,
                vx: dir * SPEED[game.speedStep] * 0.6,
                vy: -SPEED[game.speedStep] };
  game.state = 'play';
}

/* ---- Input ------------------------------------------------------------ */
const keys = Object.create(null);
addEventListener('keydown', e => {
  if ([' ','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  keys[e.key] = true; Sound.unlock();
  if (e.key === 'p' || e.key === 'P') { if (game.state === 'play') game.paused = !game.paused; }
  if (e.key === 'm' || e.key === 'M') Sound.toggle();
  if (e.key === 'Escape') toTitle();
  // typing initials directly is the grown-up shortcut; the joystick path below
  // is the arcade-authentic one and the only one that works on a touchscreen
  if (game.state === 'entry' && game.entry) {
    const up = e.key.toUpperCase();
    if (LETTERS.includes(up) && up.length === 1) {
      game.entry.chars[game.entry.slot] = LETTERS.indexOf(up);
      advanceEntry();
    } else if (e.key === 'Backspace' && game.entry.slot > 0) {
      game.entry.slot--;
    } else if (e.key === 'Enter') {
      while (game.entry) advanceEntry();
    }
  }
});
addEventListener('keyup', e => { keys[e.key] = false; });

function toTitle() {
  if (game.state === 'title') return;
  game.paused = false;
  game.state = 'title';
}

const touch = { left:false, right:false, fire:false };
function bindPad(id, prop) {
  const el = document.getElementById(id);
  const on  = e => { e.preventDefault(); Sound.unlock(); touch[prop] = true; };
  const off = e => { e.preventDefault(); touch[prop] = false; };
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on); el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindPad('bL','left'); bindPad('bR','right'); bindPad('bF','fire');
function bindTap(id, fn) {
  const el = document.getElementById(id);
  const h = e => { e.preventDefault(); Sound.unlock(); fn(); };
  el.addEventListener('touchstart', h, {passive:false});
  el.addEventListener('click', h);
}
/* ---- SWIVEL STICK (touch) — shared pattern, see rung 2 for the full note ---
   LEFT half of the play area = a virtual stick whose origin is wherever you put
   your thumb down; swivel left/right to steer. RIGHT half = fire. Multi-touch
   by identifier so steering and firing are simultaneous. The button pad still
   works; this is an alternative, not a replacement. */
const Stick = (() => {
  const DEAD = 9;
  let stickId = null, originX = 0, curX = 0, fireId = null;
  const state = { active:false, ox:0, dx:0 };
  function apply() {
    const dx = curX - originX;
    state.dx = dx;
    touch.left  = state.active && dx < -DEAD;
    touch.right = state.active && dx >  DEAD;
  }
  function start(e) {
    const r = cv.getBoundingClientRect();
    for (const t of e.changedTouches) {
      const leftHalf = (t.clientX - r.left) < r.width / 2;
      if (leftHalf && stickId === null) {
        stickId = t.identifier; originX = curX = t.clientX;
        state.active = true; state.ox = t.clientX - r.left;
      } else if (!leftHalf && fireId === null) {
        fireId = t.identifier; touch.fire = true;
      }
    }
    apply(); e.preventDefault(); Sound.unlock();
  }
  function move(e) {
    for (const t of e.changedTouches) if (t.identifier === stickId) curX = t.clientX;
    apply(); e.preventDefault();
  }
  function end(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === stickId) { stickId = null; state.active = false;
                                      touch.left = touch.right = false; }
      if (t.identifier === fireId)  { fireId = null; touch.fire = false; }
    }
    apply();
  }
  cv.addEventListener('touchstart',  start, { passive:false });
  cv.addEventListener('touchmove',   move,  { passive:false });
  cv.addEventListener('touchend',    end,   { passive:false });
  cv.addEventListener('touchcancel', end,   { passive:false });
  return state;
})();

bindTap('bP', () => { if (game.state === 'play') game.paused = !game.paused; });
bindTap('bT', () => toTitle());
bindTap('bM', () => Sound.toggle());

/* Virtual input channel for the simulated-playtest harness. A bot drives THESE
   and nothing else — it cannot set paddleX directly, so it is bound by exactly
   the same paddle speed and clamping a human is. A harness that teleports the
   paddle isn't measuring the game, it's measuring nothing. */
const simInput = { left:false, right:false, fire:false };

const held = {
  left:  () => keys['ArrowLeft']  || keys['a'] || keys['A'] || touch.left  || simInput.left,
  right: () => keys['ArrowRight'] || keys['d'] || keys['D'] || touch.right || simInput.right,
  fire:  () => keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'] || touch.fire || simInput.fire
};

/* Initials entry needs its OWN bindings. The WASD movement aliases are also
   letters people put in their initials — typing "DAN" would spin the letter
   wheel with the A and D while entering it. An input alias bound for one mode
   WILL fire in another; a modal state must define its bindings, never inherit
   gameplay ones. See INVARIANTS INV-15. Arrows and touch only here. */
const entryNav = {
  left:  () => keys['ArrowLeft']  || touch.left  || simInput.left,
  right: () => keys['ArrowRight'] || touch.right || simInput.right,
  ok:    () => keys[' '] || keys['Enter'] || touch.fire || simInput.fire
};

/* ---- Speed curve ------------------------------------------------------ */
function bumpSpeed(reason) {
  if (game.speedStep >= SPEED.length - 1) return;
  game.speedStep++;
  const b = game.ball;
  if (b) {                               // retarget to the new speed, keep heading
    const mag = Math.hypot(b.vx, b.vy) || 1;
    const s = SPEED[game.speedStep];
    b.vx = b.vx / mag * s; b.vy = b.vy / mag * s;
  }
  game.msg = reason; game.msgTimer = 900;
  Sound.speed();
}

/* ---- INV-1: substepped collision, in from the first line --------------
   The ball is 3px and bricks are 6px tall. At a clamped 50ms frame the ball
   travels ~11px — clean through a brick with a point test. This rung is
   where INV-1 pays for itself before a single bug is filed.              */
const SUB_PX = 1.5;

function brickAt(px, py) {
  for (const b of game.bricks) {
    if (!b.alive) continue;
    if (px >= b.x && px < b.x + BRICK_W && py >= b.y && py < b.y + BRICK_H) return b;
  }
  return null;
}

function smashBrick(b) {
  b.alive = false;
  game.score += ROW_DEF[b.row].pts;
  Sound.brick(b.row);
  const def = ROW_DEF[b.row];
  if (def.name === 'orange' && !game.hitOrange) { game.hitOrange = true; bumpSpeed(def.label); }
  if (def.name === 'red'    && !game.hitRed)    { game.hitRed    = true; bumpSpeed(def.label); }
}

function stepBall(dt) {
  const b = game.ball;
  const dist = Math.hypot(b.vx, b.vy) * dt;
  const steps = Math.max(1, Math.ceil(dist / SUB_PX));
  const h = dt / steps;                    // time per substep

  for (let s = 0; s < steps; s++) {
    /* Recompute the step vector from CURRENT velocity every substep.
       Computing sx/sy once before the loop is a stale-state bug: a bounce
       mid-frame reverses velocity, but the remaining substeps would keep
       travelling the ORIGINAL direction — ploughing the ball up through
       several bricks in a single frame. Measured before the fix: a row worth
       3 points scored 5, a row worth 7 scored 17. See INVARIANTS INV-12. */
    const sx = b.vx * h, sy = b.vy * h;
    // --- horizontal, then test
    b.x += sx;
    if (b.x - BALL/2 <= PLAY_L) { b.x = PLAY_L + BALL/2; b.vx = Math.abs(b.vx); Sound.wall(); }
    if (b.x + BALL/2 >= PLAY_R) { b.x = PLAY_R - BALL/2; b.vx = -Math.abs(b.vx); Sound.wall(); }
    let hit = brickAt(b.x, b.y);
    if (hit) { b.vx = -b.vx; b.x -= sx; smashBrick(hit); registerHit(); }

    // --- vertical, then test
    b.y += sy;
    if (b.y - BALL/2 <= CEIL) {
      b.y = CEIL + BALL/2; b.vy = Math.abs(b.vy); Sound.wall();
      /* 1976: breaking through to the back wall is punished with BOTH a halved
         paddle AND the ball jumping to maximum speed. Documented behaviour —
         I had only implemented the paddle half of it until 2026-07-18. It is
         gated behind a genuine player achievement and the curve resets on a
         new ball, so it reads as a dramatic spike rather than a death spiral. */
      if (!game.brokeThrough) {
        game.brokeThrough = true;
        game.paddleW = PADDLE_FULL / 2;
        game.paddleX = Math.min(game.paddleX, PLAY_R - game.paddleW);
        while (game.speedStep < SPEED.length - 1) game.speedStep++;
        const mag = Math.hypot(b.vx, b.vy) || 1, sp = SPEED[game.speedStep];
        b.vx = b.vx / mag * sp; b.vy = b.vy / mag * sp;
        game.msg = 'BREAKTHROUGH'; game.msgTimer = 1400;
        Sound.speed();
      }
    }
    hit = brickAt(b.x, b.y);
    if (hit) { b.vy = -b.vy; b.y -= sy; smashBrick(hit); registerHit(); }

    // --- paddle: contact point sets the angle. THE mechanic of this rung.
    if (b.vy > 0 &&
        b.y + BALL/2 >= PADDLE_Y && b.y - BALL/2 <= PADDLE_Y + PADDLE_H &&
        b.x >= game.paddleX && b.x <= game.paddleX + game.paddleW) {
      const t = ((b.x - game.paddleX) / game.paddleW) * 2 - 1;   // -1 .. +1
      const angle = t * (Math.PI / 3);                            // up to 60 deg
      const spd = SPEED[game.speedStep];
      b.vx =  Math.sin(angle) * spd;
      b.vy = -Math.cos(angle) * spd;
      b.y  = PADDLE_Y - BALL/2 - 0.01;
      Sound.paddle();
      registerHit();
    }

    // --- lost
    if (b.y - BALL/2 > H) { loseBall(); return; }
  }
}

function registerHit() {
  game.hits++;
  if (game.hits === 4)  bumpSpeed('4 HITS');
  if (game.hits === 12) bumpSpeed('12 HITS');
}

/* ---- Initials entry, arcade style ------------------------------------
   Left/right cycle the letter, fire locks it in. The same three controls the
   cabinet had — a stick and one button — which is exactly why it also works on
   the touch pad without inventing an on-screen keyboard. */
function startEntryOrTitle() {
  if (HiScore.qualifies(game.score)) {
    /* pl/pr/pf start TRUE, not false. The button that got you to this screen is
       still physically down on the next frame — with false, that same press
       edge-triggers again and skips slot 0. Typing "DAN" came out as "ADA",
       shifted by exactly one slot. A modal screen must treat every control as
       already-held until it is seen released. */
    game.entry = { chars: [0, 0, 0], slot: 0, hold: 0, pl: true, pr: true, pf: true };
    game.state = 'entry';
  } else {
    game.state = 'title';
  }
}
function advanceEntry() {
  const e = game.entry;
  if (!e) return;
  e.slot++;
  if (e.slot > 2) {
    const name = e.chars.map(i => LETTERS[i]).join('');
    game.lastRank = HiScore.add(name, game.score);
    game.entry = null;
    game.state = 'title';
    Sound.clear();
  }
}

function loseBall() {
  game.ball = null;
  game.balls--;
  Sound.lose();
  if (game.balls <= 0) {
    game.state = 'over';
    } else {
    newBall();
  }
}

/* ---- Update ----------------------------------------------------------- */
let firePrev = false;
function update(dt) {
  if (game.msgTimer > 0) game.msgTimer -= dt;
  if (game.flash > 0) game.flash -= dt;

  if (game.state === 'title') {
    if (held.fire() && !firePrev) newGame();
    firePrev = held.fire(); return;
  }
  if (game.state === 'over') {
    if (held.fire() && !firePrev) startEntryOrTitle();
    firePrev = held.fire(); return;
  }
  if (game.state === 'entry') {
    const e = game.entry;
    const L = entryNav.left(), Rr = entryNav.right(), OK = entryNav.ok();
    const cyc = d => { e.chars[e.slot] = (e.chars[e.slot] + d + LETTERS.length) % LETTERS.length; };
    // edge-trigger, then auto-repeat while held — 27 letters is too many to tap
    e.hold -= dt;
    if (L  && !e.pl) { cyc(-1); e.hold = 380; }
    if (Rr && !e.pr) { cyc(+1); e.hold = 380; }
    if ((L || Rr) && e.hold <= 0) { cyc(L ? -1 : +1); e.hold = 110; }
    if (OK && !e.pf) advanceEntry();
    e.pl = L; e.pr = Rr; e.pf = OK;
    firePrev = OK;
    return;
  }
  if (game.state === 'won') {
    if (held.fire() && !firePrev) startEntryOrTitle();
    firePrev = held.fire(); return;
  }
  if (game.state === 'cleared') {
    if (game.msgTimer <= 0) {
      if (game.level >= MAX_WALLS) {            // 1976: there is no wall 3
        game.state = 'won';
            } else { game.level++; newLevel(); }
    }
    return;
  }
  if (game.paused) { firePrev = held.fire(); return; }

  // paddle
  const spd = 0.13;
  if (held.left())  game.paddleX -= spd * dt;
  if (held.right()) game.paddleX += spd * dt;
  game.paddleX = Math.max(PLAY_L, Math.min(PLAY_R - game.paddleW, game.paddleX));

  if (game.state === 'serve') {
    const f = held.fire();
    if (f && !firePrev) launch();
    firePrev = f;
    return;
  }

  firePrev = held.fire();
  if (game.ball) stepBall(dt);

  if (game.bricks.every(b => !b.alive)) {
    game.state = 'cleared';
    game.msg = 'WALL CLEARED'; game.msgTimer = 1600;
    game.flash = 400; game.ball = null;
    Sound.clear();
  }
}

/* ---- Render ----------------------------------------------------------- */
function render() {
  cx.fillStyle = TI.black; cx.fillRect(0, 0, W, H);

  // HUD
  text('SCORE', 6, 3, TI.gray);
  text(String(game.score).padStart(4,'0'), 6, 11, TI.white);
  const hs = 'HI ' + String(topScore()).padStart(4,'0');
  text(hs, W - textW(hs) - 6, 3, TI.gray);
  const lv = 'WALL ' + game.level + '/' + MAX_WALLS;
  text(lv, W - textW(lv) - 6, 11, TI.darkYellow);
  if (Sound.muted) center('SOUND OFF', 3, '#555');
  /* Bricks remaining. Modern retention research is blunt about this: players
     abandon a stage far more readily when they cannot tell how much is left.
     The fix for "would anyone have the patience" is usually visible distance,
     not less content. See UX-22. */
  if (game.state !== 'title')
    center('BRICKS ' + String(game.bricks.filter(b => b.alive).length).padStart(3,'0'),
           11, '#666');

  if (game.state === 'title') {
    center('BREAKOUT', 38, TI.lightRed);
    center('TI-99/4A PALETTE', 52, '#444');

    // The high score table. This is what makes a cabinet social — the whole
    // point is that somebody else's initials are sitting there taunting you.
    const list = HiScore.list();
    center('HIGH SCORES', 74, TI.cyan);
    if (!list.length) {
      center('NO SCORES YET', 94, '#555');
      center('BE THE FIRST', 106, '#444');
    } else {
      let y = 90;
      list.forEach((e, i) => {
        const fresh = game.lastRank === i + 1;
        const blink = fresh && ((performance.now()/300|0) % 2);
        const col = blink ? TI.white : fresh ? TI.lightYellow : TI.gray;
        text(String(i + 1).padStart(2,' '), 50, y, '#555');
        text(e.n, 74, y, col);
        text(String(e.s).padStart(4,'0'), 114, y, col);
        text(e.d.slice(5), 152, y, '#3d3d3d');
        y += 10;
      });
    }

    center(matchMedia('(hover: none)').matches ? 'TAP LAUNCH TO START' : 'PRESS SPACE TO START',
           184, ((performance.now()/500|0) % 2) ? TI.lightYellow : TI.darkYellow);

    let yy = 204;                                   // scoring legend
    for (let r = 0; r < ROWS; r += 2) {
      cx.fillStyle = ROW_DEF[r].col;
      cx.fillRect(66, yy, 56, 4);
      // 10px pitch, not 8 — at 8 the 7px glyphs were touching and the column
      // of point values read as one smeared shape
      text(String(ROW_DEF[r].pts) + ' PTS', 130, yy - 2, ROW_DEF[r].col);
      yy += 10;
    }
    return;
  }

  if (game.state === 'entry') {
    center('NEW HIGH SCORE', 74, TI.lightYellow);
    center(String(game.score), 94, TI.white);
    center('ENTER YOUR INITIALS', 116, '#666');
    const e = game.entry;
    for (let i = 0; i < 3; i++) {
      const x = (W/2 | 0) - 21 + i * 16;
      const active = i === e.slot;
      const blink = active && ((performance.now()/300|0) % 2);
      text(LETTERS[e.chars[i]], x, 138, blink ? TI.white : active ? TI.lightYellow : TI.gray);
      if (active) { cx.fillStyle = TI.lightYellow; cx.fillRect(x, 148, 5, 1); }
    }
    center(matchMedia('(hover: none)').matches
      ? 'ARROWS PICK  -  FIRE LOCKS IN'
      : 'ARROWS OR TYPE  -  SPACE LOCKS IN', 172, '#555');
    return;
  }

  // walls
  cx.fillStyle = game.flash > 0 ? TI.white : '#333';
  cx.fillRect(0, CEIL - 2, W, 2);
  cx.fillRect(0, CEIL - 2, WALL - 2, H - CEIL);
  cx.fillRect(W - WALL + 2, CEIL - 2, WALL - 2, H - CEIL);

  // bricks — 1px inset so the grid reads without needing real gaps
  for (const b of game.bricks) {
    if (!b.alive) continue;
    cx.fillStyle = ROW_DEF[b.row].col;
    cx.fillRect(b.x, b.y, BRICK_W - 1, BRICK_H - 1);
  }

  // paddle
  cx.fillStyle = TI.cyan;
  cx.fillRect(game.paddleX|0, PADDLE_Y, game.paddleW|0, PADDLE_H);

  // ball
  if (game.ball) {
    cx.fillStyle = TI.white;
    cx.fillRect((game.ball.x - BALL/2)|0, (game.ball.y - BALL/2)|0, BALL, BALL);
  }

  /* Labelled. Unlabelled iconography is a guessing game: Daniel played this and
     could not tell what either dot row meant. If a HUD element needs explaining,
     it needs a label — see UX-21. */
  text('BALLS', 8, H - 18, '#555');
  cx.fillStyle = TI.cyan;
  for (let i = 0; i < game.balls; i++) cx.fillRect(8 + i*8, H - 7, 3, 3);

  const sl = 'SPEED';
  text(sl, W - textW(sl) - 8, H - 18, '#555');
  for (let i = 0; i < SPEED.length; i++) {           // the authored curve, visible
    cx.fillStyle = i <= game.speedStep ? TI.lightRed : '#2a2a2a';
    cx.fillRect(W - 8 - (SPEED.length - i)*6, H - 7, 4, 3);
  }

  if (game.state === 'serve') center('PRESS SPACE TO SERVE', 150, TI.darkYellow);
  if (game.msgTimer > 0)      center(game.msg, 138, TI.lightYellow);
  if (game.paused)            center('PAUSED', 120, TI.lightYellow);
  if (game.state === 'over') {
    center('GAME OVER', 112, TI.mediumRed);
    if (game.score >= topScore() && game.score > 0) center('NEW HIGH SCORE', 126, TI.lightYellow);
    center('FIRE TO CONTINUE', 142, TI.gray);
  }
  if (game.state === 'won') {
    center('BOTH WALLS CLEARED', 106, TI.mediumGreen);
    center(game.score >= PERFECT ? 'PERFECT ' + PERFECT : 'SCORE ' + game.score,
           122, TI.lightYellow);
    center('THERE IS NO WALL 3', 136, '#666');   // 1976: the game genuinely ends
    center('FIRE TO CONTINUE', 152, TI.gray);
  }
}

/* ---- Loop ------------------------------------------------------------- */
let last = performance.now();
function frame(now) {
  const dt = Math.min(50, now - last);   // clamp: see INV-2
  last = now;
  update(dt); render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---- Test hook (INV-6) ------------------------------------------------ */
window.__breakout = {
  get state()  { return game.state; },
  get score()  { return game.score; },
  get alive()  { return game.bricks.filter(b => b.alive).length; },
  get speed()  { return SPEED[game.speedStep]; },
  get step()   { return game.speedStep; },
  get paddleW(){ return game.paddleW; },
  get entities(){ return game.bricks.length + (game.ball ? 1 : 0); },
  game, newGame, newLevel, newBall, launch, toTitle, Sound,
  SPEED, ROW_DEF, MAX_WALLS, PERFECT, HiScore, LETTERS, TI,
  startEntryOrTitle, advanceEntry, topScore, Stick,
  geom: { W, H, WALL, PLAY_L, PLAY_R, CEIL, COLS, ROWS,
          BRICK_W, BRICK_H, BRICK_TOP, PADDLE_Y, PADDLE_FULL, PADDLE_H, BALL,
          PADDLE_SPEED: 0.13 },

  /* ---- SIM CONTRACT -------------------------------------------------
     The standard interface every rung in this repo implements so one
     harness (tools/playtest-sim.js) can drive any of them.
       input      virtual controls; the ONLY way a bot may act
       step(dt)   advance the simulation one tick WITHOUT rendering, so a
                  run executes thousands of times faster than real time
       observe()  read-only snapshot for scoring a run                   */
  sim: {
    input: simInput,
    step(dt) { update(dt); },
    reset() { simInput.left = simInput.right = simInput.fire = false; },
    observe() {
      return {
        state: game.state, score: game.score, level: game.level,
        balls: game.balls, bricksAlive: game.bricks.filter(b => b.alive).length,
        speedStep: game.speedStep, paddleW: game.paddleW, paddleX: game.paddleX,
        brokeThrough: game.brokeThrough,
        ball: game.ball ? { x: game.ball.x, y: game.ball.y,
                            vx: game.ball.vx, vy: game.ball.vy } : null
      };
    }
  }
};
</script>
